          <div class="feedback-banner" id="streakFeedback"></div>
          <h4 style="margin-top:16px; font-size:14px;">관찰한 조흔색은?</h4>
          <div class="color-options" id="streakColorOpts"></div>
          <div class="observation-log">
            <h4>📋 조흔색 관찰 일지</h4>
            <div id="streakLog"></div>
          </div>
        </div>
      </div>
      <div class="stage-nav">
        <button class="btn" onclick="goToStage(2)">← 이전</button>
        <div style="display:flex; gap:8px;">
          <button class="btn btn-skip" onclick="skipStage(3)">건너뛰기</button>
          <button class="btn btn-primary" id="toStage4" disabled>다음 단계 →</button>
        </div>
      </div>
    </div>
  `;

  // 드래그 광물 핸들 스타일 (한 번만 추가)
  if (!document.getElementById('dragMineralStyle')) {
    const style = document.createElement('style');
    style.id = 'dragMineralStyle';
    style.textContent = `
      .drag-hint-label {
        font-size: 12px;
        color: var(--accent-primary);
        font-weight: 700;
        margin-bottom: 8px;
        animation: pulseLabel 1.6s ease-in-out infinite;
      }
      .drag-hint-sub {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 6px;
      }
      @keyframes pulseLabel {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      .drag-mineral-handle {
        width: 110px; height: 110px;
        margin: 0 auto;
        cursor: grab;
        position: relative;
        z-index: 50;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        filter: drop-shadow(0 4px 8px rgba(0,0,0,0.18));
        transition: transform 0.15s, filter 0.15s;
      }
      .drag-mineral-handle:hover {
        transform: scale(1.06) translateY(-2px);
        filter: drop-shadow(0 8px 16px rgba(200,71,43,0.35));
      }
      .drag-mineral-handle.dragging {
        cursor: grabbing;
        position: fixed !important;
        z-index: 9999;
        filter: drop-shadow(0 12px 28px rgba(0,0,0,0.45));
        opacity: 0.92;
        pointer-events: none;
        transform: scale(1.15);
      }
      .drag-mineral-handle.no-hint { /* hint always allowed */ }
      .drag-mineral-handle > div { width: 100%; height: 100%; }
      .drag-mineral-handle svg { width: 100%; height: 100%; display: block; }
      .streak-plate.over-plate {
        outline: 3px dashed var(--accent-primary);
        outline-offset: -3px;
      }
    `;
    document.head.appendChild(style);
  }

  const whitePlate = stage.querySelector('#whitePlate');
  const blackPlate = stage.querySelector('#blackPlate');
  const wctx = whitePlate.getContext('2d');
  const bctx = blackPlate.getContext('2d');
  const dragMineral = stage.querySelector('#dragMineral');
  const dragMineralSvg = stage.querySelector('#dragMineralSvg');

  // 드래그 상태
  let dragging = false;
  let originalParent = dragMineral.parentNode;
  let originalRect = null;
  let lastScratch = {plate: null, x: null, y: null};

  // 조흔 그리기 함수
  const drawScratch = (canvas, ctx, isBlack, cx, cy, prev) => {
    const m = MINERALS[STATE.selectedMineral];
    if (m.hardness > 6.5) {
      // 석영: 약간의 가루만
      ctx.fillStyle = isBlack ? 'rgba(80,80,80,0.1)' : 'rgba(220,220,220,0.2)';
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(cx + (Math.random()-0.5)*8, cy + (Math.random()-0.5)*8, Math.random()*1, 0, Math.PI*2);
        ctx.fill();
      }
    } else {
      const color = m.streakRgb || '#999';
      ctx.strokeStyle = color;
      ctx.lineWidth = 8 + Math.random()*5;
      ctx.lineCap = 'round';
      ctx.globalAlpha = 0.6 + Math.random()*0.3;
      if (prev) {
        ctx.beginPath();
        ctx.moveTo(prev.x, prev.y);
        ctx.lineTo(cx, cy);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.arc(cx, cy, 4, 0, Math.PI*2);
        ctx.fill();
      }
      // 가루 입자
      ctx.fillStyle = color;
      for (let i = 0; i < 5; i++) {
        ctx.globalAlpha = 0.3 + Math.random()*0.3;
        ctx.beginPath();
        ctx.arc(cx + (Math.random()-0.5)*18, cy + (Math.random()-0.5)*18, Math.random()*1.8, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
  };

  // 조흔판 위에 있는지 검사
  const checkPlateHit = (clientX, clientY) => {
    [whitePlate, blackPlate].forEach(plate => plate.classList.remove('over-plate'));
    for (const [plate, ctx, isBlack] of [[whitePlate, wctx, false], [blackPlate, bctx, true]]) {
      const r = plate.getBoundingClientRect();
      // 광물 중심을 사용 (clientX/Y는 이미 광물 중심)
      if (clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom) {
        plate.classList.add('over-plate');
        const cx = (clientX - r.left) * (plate.width / r.width);
        const cy = (clientY - r.top) * (plate.height / r.height);
        const prev = (lastScratch.plate === plate) ? {x: lastScratch.x, y: lastScratch.y} : null;
        drawScratch(plate, ctx, isBlack, cx, cy, prev);
        lastScratch = {plate, x: cx, y: cy};
        return true;
      }
    }
    lastScratch = {plate: null, x: null, y: null};
    return false;
  };

  let scratchSoundCounter = 0;
  let dragOffset = {x: 0, y: 0};

  const onDragStart = (e) => {
    e.preventDefault();
    dragging = true;
    dragMineral.classList.remove('no-hint');
    dragMineral.classList.add('dragging');

    // 원래 위치 기록 (자리 차지를 위해 placeholder 만듦)
    originalRect = dragMineral.getBoundingClientRect();
    if (!dragMineral._placeholder) {
      const ph = document.createElement('div');
      ph.style.width = originalRect.width + 'px';
      ph.style.height = originalRect.height + 'px';
      ph.style.margin = '0 auto';
      dragMineral._placeholder = ph;
    }
    dragMineral.parentNode.insertBefore(dragMineral._placeholder, dragMineral);
    document.body.appendChild(dragMineral);

    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    // 잡은 위치를 광물 중심으로 (자연스럽게)
    dragOffset.x = originalRect.width / 2;
    dragOffset.y = originalRect.height / 2;
    dragMineral.style.left = (cx - dragOffset.x) + 'px';
    dragMineral.style.top = (cy - dragOffset.y) + 'px';
    dragMineral.style.margin = '0';
  };

  const onDragMove = (e) => {
    if (!dragging) return;
    e.preventDefault();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    dragMineral.style.left = (cx - dragOffset.x) + 'px';
    dragMineral.style.top = (cy - dragOffset.y) + 'px';

    // 광물 중심 좌표로 조흔판 충돌 체크
    const hit = checkPlateHit(cx, cy);
    if (hit) {
      scratchSoundCounter++;
      if (scratchSoundCounter % 4 === 0) playSound('scratch');
    }
  };

  const onDragEnd = (e) => {
    if (!dragging) return;
    dragging = false;
    dragMineral.classList.remove('dragging');
    [whitePlate, blackPlate].forEach(p => p.classList.remove('over-plate'));
    lastScratch = {plate: null, x: null, y: null};

    // 원래 자리로 복귀
    if (dragMineral._placeholder && dragMineral._placeholder.parentNode) {
      dragMineral._placeholder.parentNode.replaceChild(dragMineral, dragMineral._placeholder);
    }
    dragMineral.style.position = '';
    dragMineral.style.left = '';
    dragMineral.style.top = '';
    dragMineral.style.margin = '0 auto';
  };

  dragMineral.addEventListener('mousedown', onDragStart);
  dragMineral.addEventListener('touchstart', onDragStart, {passive: false});
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('touchmove', onDragMove, {passive: false});
  document.addEventListener('mouseup', onDragEnd);
  document.addEventListener('touchend', onDragEnd);
  document.addEventListener('touchcancel', onDragEnd);

  stage.querySelector('#clearPlatesBtn').addEventListener('click', () => {
    wctx.clearRect(0, 0, whitePlate.width, whitePlate.height);
    bctx.clearRect(0, 0, blackPlate.width, blackPlate.height);
    playSound('click');
  });

  const renderStreak = (id) => {
    const m = MINERALS[id];
    stage.querySelector('#streakMineralDisplay').innerHTML = renderMineralSVG(id, 'large');
    dragMineralSvg.innerHTML = renderMineralSVG(id, 'large');
    stage.querySelector('#streakMineralName').textContent = m.name;
    stage.querySelector('#streakMineralFormula').textContent = m.formula;
    stage.querySelector('#streakMineralHardness').textContent = m.hardness;
    const fb = stage.querySelector('#streakFeedback');
    fb.classList.remove('show','success','error');
    if (m.hardness > 6.5) {
      fb.classList.add('show','error');
      fb.innerHTML = `⚠️ <strong>${m.name}(굳기 ${m.hardness})</strong>은 조흔판(굳기 6.5)보다 굳기가 더 커서 <strong>긁히지 않아요!</strong> 직접 드래그해서 확인해보세요. 조흔색이 나타나지 않습니다.`;
    }
    const optsDiv = stage.querySelector('#streakColorOpts');
    optsDiv.innerHTML = '';
    m.streakColorOptions.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'color-btn';
      btn.innerHTML = `<span class="color-swatch" style="background:${opt.color}"></span>${opt.label}`;
      btn.addEventListener('click', () => {
        if (STATE.observed[id].streak) return;
        optsDiv.querySelectorAll('.color-btn').forEach(b => b.disabled = true);
        playSound('click');
        if (opt.correct) {
          btn.classList.add('correct');
          STATE.scores.streak++;
          setTimeout(() => playSound('success'), 100);
          fb.classList.add('show','success');
          if (opt.special) {
            fb.innerHTML = `✅ <strong>정확해요!</strong> 석영의 굳기(7)가 조흔판(6.5)보다 커서 긁히지 않습니다.`;
          } else {
            fb.innerHTML = `✅ <strong>정답이에요!</strong> ${m.name}의 조흔색은 <strong>${opt.label}</strong>입니다.`;
          }
        } else {
          btn.classList.add('wrong');
          const correctOpt = m.streakColorOptions.find(o => o.correct);
          optsDiv.querySelectorAll('.color-btn').forEach((b, idx) => {
            if (m.streakColorOptions[idx].correct) b.classList.add('correct');
          });
          fb.classList.add('show','error');
          fb.innerHTML = `🔍 ${m.name}의 조흔색은 <strong>${correctOpt.label}</strong>입니다.`;
          playSound('error');
        }
        STATE.observed[id].streak = true;
        const log = stage.querySelector('#streakLog');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `<strong>${m.name}</strong>: ${m.streakColor}`;
        log.appendChild(entry);
        updateStreakSwitcher();
        const allDone = MINERAL_ORDER.every(id => STATE.observed[id].streak);
        stage.querySelector('#toStage4').disabled = !allDone;
      });
      optsDiv.appendChild(btn);
    });
  };

  const updateStreakSwitcher = () => {
    const sw = stage.querySelector('#streakMineralSwitcher');
    sw.innerHTML = '';
    MINERAL_ORDER.forEach(id => {
      const b = document.createElement('button');
      b.className = 'btn';
      b.style.padding = '4px 8px';
      b.style.fontSize = '11px';
      b.innerHTML = STATE.observed[id].streak ? `✓ ${MINERALS[id].name}` : MINERALS[id].name;
      if (STATE.observed[id].streak) b.style.opacity = '0.5';
      b.addEventListener('click', () => {
        STATE.selectedMineral = id;
        renderStreak(id);
        wctx.clearRect(0, 0, whitePlate.width, whitePlate.height);
        bctx.clearRect(0, 0, blackPlate.width, blackPlate.height);
      });
      sw.appendChild(b);
    });
  };

  if (!STATE.selectedMineral) STATE.selectedMineral = MINERAL_ORDER[0];
  renderStreak(STATE.selectedMineral);
  updateStreakSwitcher();

  // 한번 드래그 후 펄스 힌트 끄기
  dragMineral.addEventListener('mousedown', () => {
    setTimeout(() => dragMineral.classList.add('no-hint'), 100);
  }, {once: true});
  dragMineral.addEventListener('touchstart', () => {
    setTimeout(() => dragMineral.classList.add('no-hint'), 100);
  }, {once: true, passive: true});

  stage.querySelector('#toStage4').addEventListener('click', () => goToStage(4));
}

// ============== 5단계: 자성 관찰 ==============
function buildStage4() {
  const stage = document.getElementById('stage-4');
  stage.innerHTML = `
    <div class="stage-card">
      <h2 class="stage-title"><span class="stage-number">STEP 5</span> 자성 관찰</h2>
      <p class="stage-subtitle">클립을 광물에 가까이 가져가 보세요. 어떤 광물이 자성을 띠는지 확인할 수 있습니다.</p>
      <div class="info-box">
        🧲 <strong>자철석(Fe₃O₄)</strong>은 강한 자성을 띠어 클립이 달라붙어요. <strong>적철석(Fe₂O₃)</strong>은 자철석에 비해 자성이 매우 약해서 클립이 거의 반응하지 않습니다. 나머지 광물은 자성이 없어 클립이 닿아도 떨어집니다.
      </div>
      <div class="mag-layout">
        <div style="text-align:center;">
          <h4 style="margin-bottom:12px;">선택한 광물</h4>
          <div id="magMineralDisplay" style="display:inline-block; width:120px; height:120px;"></div>
          <div class="mineral-name" id="magMineralName"></div>
          <h4 style="margin-top:16px; font-size:13px; color:var(--text-muted);">광물 바꾸기:</h4>
          <div id="magMineralSwitcher" style="display:flex; flex-wrap:wrap; gap:4px; justify-content:center; margin-top:8px;"></div>
        </div>
        <div>
          <p style="font-size:13px; color:var(--text-muted); margin-bottom:10px;">👆 클립을 드래그해서 광물 가까이로 가져가세요.</p>
          <div class="magnetism-area" id="magArea"></div>
          <button class="btn" id="resetClipBtn" style="margin-top:10px; font-size:12px; padding:6px 12px;">↻ 클립 위치 초기화</button>
          <div class="feedback-banner" id="magFeedback"></div>
          <div class="observation-log">
            <h4>🧲 자성 관찰 일지</h4>
            <div id="magLog"></div>
          </div>
        </div>
      </div>
      <div class="stage-nav">
        <button class="btn" onclick="goToStage(3)">← 이전</button>
        <div style="display:flex; gap:8px;">
          <button class="btn btn-skip" onclick="skipStage(4)">건너뛰기</button>
          <button class="btn btn-primary" id="toStage5" disabled>다음 단계 →</button>
        </div>
      </div>
    </div>
  `;

  let fallAnimId = null;
  const stopFalling = () => { if (fallAnimId) { cancelAnimationFrame(fallAnimId); fallAnimId = null; } };

  const renderMag = (id) => {
    stopFalling();
    const m = MINERALS[id];
    stage.querySelector('#magMineralDisplay').innerHTML = renderMineralSVG(id, 'large');
    stage.querySelector('#magMineralName').textContent = m.name;
    const area = stage.querySelector('#magArea');
    area.innerHTML = `
      <svg width="100%" height="100%" viewBox="0 0 600 320" style="position:absolute; top:0; left:0; pointer-events:none;">
        <g id="fieldLines"></g>
      </svg>
      <div id="magMineralAnchor" style="position:absolute; left:60%; top:50%; transform:translate(-50%,-50%); width:130px; height:130px;">${renderMineralSVG(id, 'large')}</div>
      <div id="magClip" style="position:absolute; left:80px; top:140px; width:50px; height:50px; cursor:grab; z-index:10;">
        <svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
          <path d="M 10,10 L 35,10 L 35,40 L 20,40 L 20,18 L 28,18 L 28,32 L 25,32 L 25,22" stroke="#888" stroke-width="3" fill="none" stroke-linecap="round"/>
          <text x="25" y="48" text-anchor="middle" font-size="9" fill="var(--text-muted)">클립</text>
        </svg>
      </div>
    `;
    const fb = stage.querySelector('#magFeedback');
    fb.classList.remove('show','success','error');
    let stuck = false;

    const clip = area.querySelector('#magClip');
    const anchor = area.querySelector('#magMineralAnchor');
    const fieldG = area.querySelector('#fieldLines');

    let dragging = false, offset = {x:0, y:0};
    const onStart = (e) => {
      if (stuck) return;
      e.preventDefault();
      stopFalling();
      dragging = true;
      const rect = clip.getBoundingClientRect();
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      offset.x = cx - rect.left;
      offset.y = cy - rect.top;
      clip.style.cursor = 'grabbing';
    };

    const startFalling = () => {
      // 클립이 광물 위에서 자성 없을 때 중력에 의해 떨어지는 애니메이션
      let curTop = parseFloat(clip.style.top) || 0;
      let velocity = 0;
      const arect = area.getBoundingClientRect();
      const maxTop = arect.height - 55;
      const fall = () => {
        velocity += 0.6; // 중력
        curTop += velocity;
        if (curTop >= maxTop) {
          curTop = maxTop;
          velocity = -velocity * 0.3; // 바닥 튕김
          if (Math.abs(velocity) < 1) { fallAnimId = null; return; }
        }
        clip.style.top = curTop + 'px';
        // 약간의 회전
        const rot = Math.min(15, velocity * 1.5);
        clip.style.transform = `rotate(${rot}deg)`;
        fallAnimId = requestAnimationFrame(fall);
      };
      fallAnimId = requestAnimationFrame(fall);
    };

    const onMove = (e) => {
      if (!dragging || stuck) return;
      e.preventDefault();
      const arect = area.getBoundingClientRect();
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      let nx = cx - arect.left - offset.x;
      let ny = cy - arect.top - offset.y;
      nx = Math.max(0, Math.min(arect.width - 50, nx));
      ny = Math.max(0, Math.min(arect.height - 50, ny));
      clip.style.left = nx + 'px';
      clip.style.top = ny + 'px';
      clip.style.transform = '';

      const ar = anchor.getBoundingClientRect();
      const ax = ar.left - arect.left + ar.width/2;
      const ay = ar.top - arect.top + ar.height/2;
      const dist = Math.sqrt((nx + 25 - ax) ** 2 + (ny + 25 - ay) ** 2);

      if (m.magnetism === 'strong' && dist < 100) {
        // 자철석: 강하게 끌려 붙음
        clip.style.transition = 'all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
        clip.style.left = (ax - 25 - 50) + 'px';
        clip.style.top = (ay - 25) + 'px';
        stuck = true;
        playSound('magnet');
        let lines = '';
        for (let i = 0; i < 6; i++) {
          const angle = (Math.PI * 2 * i) / 6;
          const x1 = ax + Math.cos(angle) * 30;
          const y1 = ay + Math.sin(angle) * 30;
          const x2 = ax + Math.cos(angle) * 80;
          const y2 = ay + Math.sin(angle) * 80;
          lines += `<path d="M ${x1},${y1} Q ${ax+Math.cos(angle)*50},${ay+Math.sin(angle)*50-10} ${x2},${y2}" stroke="var(--accent-primary)" stroke-width="1.5" fill="none" opacity="0.6" stroke-dasharray="4 4">
            <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="1s" repeatCount="indefinite"/>
          </path>`;
        }
        fieldG.innerHTML = lines;
        fb.classList.add('show','success');
        fb.innerHTML = `🧲 <strong>강한 자성!</strong> 자철석에 클립이 달라붙었어요. 자철석은 천연 자석으로도 알려져 있습니다.`;
        STATE.magnetismDone[id] = true;
        addMagLog(id, '강한 자성');
        setTimeout(() => clip.style.transition = '', 600);
        updateMagSwitcher();
        checkAllMagDone();
      } else if (m.magnetism === 'weak' && dist < 50) {
        // 적철석: 미약한 흔들림
        const wobble = `translate(${(Math.random()-0.5)*4}px, ${(Math.random()-0.5)*4}px)`;
        clip.style.transform = wobble;
        if (!STATE.magnetismDone[id]) {
          fb.classList.add('show','error');
          fb.innerHTML = `🔍 적철석은 자철석과 달리 자성이 매우 약해서 클립이 거의 반응하지 않아요. (✓ 관찰 완료)`;
          STATE.magnetismDone[id] = true;
          addMagLog(id, '약한 자성 (반응 없음에 가까움)');
          updateMagSwitcher();
          checkAllMagDone();
        }
      } else if (m.magnetism === 'none' && dist < 80) {
        // 자성 없는 광물: 클립이 가까이 가면 손에서 빠져나가 자유낙하
        if (!fallAnimId) {
          dragging = false;
          clip.style.cursor = 'grab';
          startFalling();
          if (!STATE.magnetismDone[id]) {
            fb.classList.add('show','error');
            fb.innerHTML = `🔍 ${m.name}은(는) 자성이 없어요. 클립이 끌리지 않고 그대로 떨어집니다. (✓ 관찰 완료)`;
            STATE.magnetismDone[id] = true;
            addMagLog(id, '반응 없음 (클립 떨어짐)');
            playSound('click');
            updateMagSwitcher();
            checkAllMagDone();
          }
        }
      }
    };

    const onEnd = () => {
      if (!dragging) return;
      dragging = false;
      clip.style.cursor = 'grab';
      if (stuck) return;
      // 자성이 없거나 약한 광물의 경우, 클립을 손에서 놓으면 떨어짐
      if (m.magnetism === 'none' || m.magnetism === 'weak') {
        if (!fallAnimId) {
          startFalling();
        }
      }
    };

    clip.addEventListener('mousedown', onStart);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
    clip.addEventListener('touchstart', onStart, {passive:false});
    document.addEventListener('touchmove', onMove, {passive:false});
    document.addEventListener('touchend', onEnd);
  };

  const addMagLog = (id, result) => {
    const log = stage.querySelector('#magLog');
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `<strong>${MINERALS[id].name}</strong>: ${result}`;
    log.appendChild(entry);
  };

  const updateMagSwitcher = () => {
    const sw = stage.querySelector('#magMineralSwitcher');
    sw.innerHTML = '';
    MINERAL_ORDER.forEach(id => {
      const b = document.createElement('button');
      b.className = 'btn';
      b.style.padding = '4px 8px';
      b.style.fontSize = '11px';
      b.innerHTML = STATE.magnetismDone[id] ? `✓ ${MINERALS[id].name}` : MINERALS[id].name;
      if (STATE.magnetismDone[id]) b.style.opacity = '0.5';
      b.addEventListener('click', () => {
        STATE.selectedMineral = id;
        renderMag(id);
      });
      sw.appendChild(b);
    });
  };

  const checkAllMagDone = () => {
    const allDone = MINERAL_ORDER.every(id => STATE.magnetismDone[id]);
    stage.querySelector('#toStage5').disabled = !allDone;
  };

  if (!STATE.selectedMineral) STATE.selectedMineral = 'magnetite';
  renderMag(STATE.selectedMineral);
  updateMagSwitcher();

  stage.querySelector('#resetClipBtn').addEventListener('click', () => {
    renderMag(STATE.selectedMineral);
    playSound('click');
  });
  stage.querySelector('#toStage5').addEventListener('click', () => goToStage(5));
}

// ============== 6단계: 염산 반응 ==============
function buildStage5() {
  const stage = document.getElementById('stage-5');
  stage.innerHTML = `
    <div class="stage-card">
      <h2 class="stage-title"><span class="stage-number">STEP 6</span> 염산 반응 관찰</h2>
      <p class="stage-subtitle"><strong>스포이트를 클릭</strong>하면 묽은 염산(HCl)이 한 방울씩 떨어집니다. 어떤 광물이 거품을 만들까요?</p>
      <div class="info-box">
        🧪 <strong>화학 반응식:</strong> CaCO₃ + 2HCl → CaCl₂ + H₂O + CO₂↑ (방해석에서 일어나는 반응)
      </div>
      <div class="hcl-layout">
        <div style="text-align:center;">
          <h4 style="margin-bottom:12px;">선택한 광물</h4>
          <div id="hclMineralDisplay" style="display:inline-block; width:120px; height:120px;"></div>
          <div class="mineral-name" id="hclMineralName"></div>
          <h4 style="margin-top:16px; font-size:13px; color:var(--text-muted);">광물 바꾸기:</h4>
          <div id="hclMineralSwitcher" style="display:flex; flex-wrap:wrap; gap:4px; justify-content:center; margin-top:8px;"></div>
        </div>
        <div>
          <p style="font-size:13px; color:var(--text-muted); margin-bottom:10px;">👆 위쪽의 <strong>파란 스포이트</strong>를 클릭할 때마다 염산이 한 방울씩 떨어집니다.</p>
          <div class="hcl-area" id="hclArea"></div>
          <div class="feedback-banner" id="hclFeedback"></div>
          <div class="observation-log">
            <h4>🧪 염산 반응 일지</h4>
            <div id="hclLog"></div>
          </div>
        </div>
      </div>
      <div class="stage-nav">
        <button class="btn" onclick="goToStage(4)">← 이전</button>
        <div style="display:flex; gap:8px;">
          <button class="btn btn-skip" onclick="skipStage(5)">건너뛰기</button>
          <button class="btn btn-primary" id="toStage6" disabled>다음 단계 →</button>
        </div>
      </div>
    </div>
  `;

  // 스포이트 클릭 카운터 (광물별)
  const dropCount = {};

  const renderHcl = (id) => {
    const m = MINERALS[id];
    stage.querySelector('#hclMineralDisplay').innerHTML = renderMineralSVG(id, 'large');
    stage.querySelector('#hclMineralName').textContent = m.name;
    const area = stage.querySelector('#hclArea');
    area.innerHTML = `
      <div id="hclMineralPos" style="position:absolute; left:50%; top:62%; transform:translate(-50%,-50%); width:170px; height:170px;">${renderMineralSVG(id, 'large')}</div>
      <div id="dropper" class="hcl-dropper" style="position:absolute; top:8px; left:50%; transform:translateX(-50%); width:60px; height:130px; cursor:pointer;">
        <svg viewBox="0 0 60 130" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="bulb-grad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#bbb"/>
              <stop offset="100%" stop-color="#777"/>
            </linearGradient>
          </defs>
          <rect x="22" y="0" width="16" height="22" rx="4" fill="url(#bulb-grad)" stroke="#555" stroke-width="0.8"/>
          <ellipse cx="30" cy="24" rx="18" ry="7" fill="#aaa" stroke="#555" stroke-width="0.8"/>
          <path d="M 20,30 L 40,30 L 35,98 L 25,98 Z" fill="rgba(140,200,235,0.7)" stroke="#666" stroke-width="1"/>
          <path d="M 26,85 L 34,85 L 33,103 L 27,103 Z" fill="rgba(120,180,225,0.95)"/>
          <text x="30" y="125" text-anchor="middle" font-size="11" fill="var(--text-primary)" font-weight="600">묽은 염산</text>
        </svg>
        <div class="dropper-pulse"></div>
      </div>
      <canvas id="hclCanvas" width="600" height="360" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></canvas>
    `;
    const fb = stage.querySelector('#hclFeedback');
    fb.classList.remove('show','success','error');
    if (!STATE.hclDone[id]) {
      fb.classList.add('show');
      fb.style.background = 'rgba(212,160,76,0.1)';
      fb.style.borderLeftColor = 'var(--accent-secondary)';
      fb.innerHTML = `💧 <strong>${m.name}</strong> 위에 스포이트로 염산을 떨어뜨려 보세요.`;
    }

    const canvas = area.querySelector('#hclCanvas');
    const ctx = canvas.getContext('2d');
    const dropper = area.querySelector('#dropper');

    if (!dropCount[id]) dropCount[id] = 0;

    // 활성 거품들 (여러 방울 떨어뜨리면 누적)
    let activeBubbles = [];
    let bubbleAnimRunning = false;

    const startBubbleAnim = () => {
      if (bubbleAnimRunning) return;
      bubbleAnimRunning = true;
      const animate = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        activeBubbles = activeBubbles.filter(b => b.life > 0);
        activeBubbles.forEach(b => {
          ctx.fillStyle = `rgba(220,240,255,${b.life*0.7})`;
          ctx.strokeStyle = `rgba(180,220,255,${b.life*0.95})`;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
          ctx.fill();
          ctx.stroke();
          // 광택점
          ctx.fillStyle = `rgba(255,255,255,${b.life*0.8})`;
          ctx.beginPath();
          ctx.arc(b.x - b.r*0.4, b.y - b.r*0.4, b.r*0.25, 0, Math.PI*2);
          ctx.fill();
          b.y += b.vy;
          b.x += b.vx;
          b.life -= 0.012;
        });
        if (activeBubbles.length > 0) {
          requestAnimationFrame(animate);
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          bubbleAnimRunning = false;
        }
      };
      animate();
    };

    const animateOneDrop = (onLand) => {
      // 스포이트 squeeze 애니메이션
      dropper.classList.add('squeezing');
      setTimeout(() => dropper.classList.remove('squeezing'), 300);

      // 광물 중심 좌표
      const arect = area.getBoundingClientRect();
      const mineralEl = area.querySelector('#hclMineralPos');
      const mr = mineralEl.getBoundingClientRect();
      const targetX = (mr.left - arect.left + mr.width/2) / arect.width * canvas.width;
      const targetY = (mr.top - arect.top + mr.height*0.4) / arect.height * canvas.height;

      // 스포이트 끝(하단) 좌표
      const dr = dropper.getBoundingClientRect();
      const startX = (dr.left - arect.left + dr.width/2) / arect.width * canvas.width;
      const startY = (dr.top - arect.top + dr.height*0.85) / arect.height * canvas.height;

      let t = 0;
      const dropAnim = () => {
        // 거품 애니메이션이 동시에 돌고 있으면 다음 프레임 그대로 - canvas는 거품 anim에서 clear됨
        // 그래서 이 함수는 자체 leyer로 그리는 게 어렵다. 단순화: 떨어지는 동안엔 거품이 없거나, 둘 다 같이 그리기
        const dx = startX + (targetX - startX) * t;
        const dy = startY + (targetY - startY) * t * t; // 가속
        if (!bubbleAnimRunning) ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'rgba(140,200,235,0.9)';
        ctx.strokeStyle = 'rgba(80,140,180,0.9)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(dx, dy, 7, 11, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.stroke();
        // 광택
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.beginPath();
        ctx.ellipse(dx-2, dy-3, 2, 4, 0, 0, Math.PI*2);
        ctx.fill();
        t += 0.06;
        if (t < 1) {
          requestAnimationFrame(dropAnim);
        } else {
          if (!bubbleAnimRunning) ctx.clearRect(0, 0, canvas.width, canvas.height);
          // 충돌 splash
          for (let i = 0; i < 6; i++) {
            const sx = targetX + (Math.random()-0.5) * 14;
            const sy = targetY + (Math.random()-0.5) * 4;
            ctx.fillStyle = 'rgba(140,200,235,0.6)';
            ctx.beginPath();
            ctx.arc(sx, sy, 1.5, 0, Math.PI*2);
            ctx.fill();
          }
          onLand(targetX, targetY);
        }
      };
      dropAnim();
    };

    dropper.onclick = (e) => {
      e.stopPropagation();
      dropCount[id]++;
      playSound('click');
      animateOneDrop((tx, ty) => {
        if (m.hclReaction === 'bubbles') {
          playSound('bubble');
          // 거품 추가 (점점 더 많이)
          const bubbleCount = 12 + Math.floor(Math.random()*10);
          for (let i = 0; i < bubbleCount; i++) {
            activeBubbles.push({
              x: tx + (Math.random()-0.5)*70,
              y: ty + (Math.random()-0.5)*16,
              vx: (Math.random()-0.5)*0.3,
              vy: -0.8 - Math.random()*1.8,
              r: 2 + Math.random()*7,
              life: 1 + Math.random()*0.6
            });
          }
          startBubbleAnim();
          fb.classList.remove('error');
          fb.classList.add('show','success');
          fb.style.background = '';
          fb.style.borderLeftColor = '';
          fb.innerHTML = `🫧 <strong>거품 발생!</strong> ${m.name}이 묽은 염산과 반응하여 이산화탄소(CO₂) 거품이 발생합니다. <span style="color:var(--text-muted); font-size:12px;">(방울 ${dropCount[id]}회 떨어뜨림)</span><br><span style="font-size:13px;">CaCO₃ + 2HCl → CaCl₂ + H₂O + CO₂↑</span>`;
          if (!STATE.hclDone[id]) {
            STATE.hclDone[id] = true;
            addHclLog(id, '거품 발생 (CO₂↑)');
            updateHclSwitcher();
            checkAllHclDone();
          }
        } else {
          fb.classList.remove('success');
          fb.classList.add('show','error');
          fb.style.background = '';
          fb.style.borderLeftColor = '';
          fb.innerHTML = `🔍 <strong>반응 없음.</strong> ${m.name}은(는) 묽은 염산과 반응하지 않습니다. <span style="color:var(--text-muted); font-size:12px;">(방울 ${dropCount[id]}회 떨어뜨림)</span>`;
          if (!STATE.hclDone[id]) {
            STATE.hclDone[id] = true;
            addHclLog(id, '반응 없음');
            updateHclSwitcher();
            checkAllHclDone();
          }
        }
      });
    };
  };

  const addHclLog = (id, result) => {
    const log = stage.querySelector('#hclLog');
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `<strong>${MINERALS[id].name}</strong>: ${result}`;
    log.appendChild(entry);
  };

  const updateHclSwitcher = () => {
    const sw = stage.querySelector('#hclMineralSwitcher');
    sw.innerHTML = '';
    MINERAL_ORDER.forEach(id => {
      const b = document.createElement('button');
      b.className = 'btn';
      b.style.padding = '4px 8px';
      b.style.fontSize = '11px';
      b.innerHTML = STATE.hclDone[id] ? `✓ ${MINERALS[id].name}` : MINERALS[id].name;
      if (STATE.hclDone[id]) b.style.opacity = '0.5';
      b.addEventListener('click', () => {
        STATE.selectedMineral = id;
        renderHcl(id);
      });
      sw.appendChild(b);
    });
  };

  const checkAllHclDone = () => {
    const allDone = MINERAL_ORDER.every(id => STATE.hclDone[id]);
    stage.querySelector('#toStage6').disabled = !allDone;
  };

  if (!STATE.selectedMineral) STATE.selectedMineral = 'calcite';
  renderHcl(STATE.selectedMineral);
  updateHclSwitcher();

  stage.querySelector('#toStage6').addEventListener('click', () => goToStage(6));
}

    const tool = stage.querySelector(`#exp${expNum}Tool`);
    const target = stage.querySelector(`#exp${expNum}Target`);
    const targetMineralEl = target.querySelector('.hardness-target-mineral');
    const canvas = stage.querySelector(`#exp${expNum}Canvas`);
    const ctx = canvas.getContext('2d');
    const fb = stage.querySelector(`#exp${expNum}Fb`);
    const state = expState[expNum];
    const toolWarning = stage.querySelector(`#exp${expNum}ToolWarning`);

    let dragging = false;
    let placeholder = null;
    let originalRect = null;
    let lastX = null, lastY = null;
    let toolWearLevel = 0;  // 도구가 닳는 정도 (0~100)
    let toolDustParticles = []; // 방해석 가루 입자

    const onStart = (e) => {
      if (state.done) return;
      e.preventDefault();
      dragging = true;
      tool.classList.add('dragging');
      originalRect = tool.getBoundingClientRect();
      placeholder = document.createElement('div');
      placeholder.style.width = originalRect.width + 'px';
      placeholder.style.height = originalRect.height + 'px';
      tool.parentNode.insertBefore(placeholder, tool);
      document.body.appendChild(tool);
      tool.style.position = 'fixed';
      tool.style.zIndex = '9999';
      tool.style.width = originalRect.width + 'px';
      tool.style.height = originalRect.height + 'px';
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      tool.style.left = (cx - originalRect.width/2) + 'px';
      tool.style.top = (cy - originalRect.height/2) + 'px';
    };

    // 광물 SVG의 실제 영역(타원형 hit area)에 들어갔는지 검사
    const isOverMineral = (cx, cy) => {
      const mr = targetMineralEl.getBoundingClientRect();
      // 광물 중심
      const mcx = mr.left + mr.width / 2;
      const mcy = mr.top + mr.height / 2;
      // 광물 SVG는 거의 정사각형이므로 중심부에서 일정 반경 내를 광물 영역으로 판정
      // 광물 모양은 다양하지만 대체로 중심에서 width*0.4 정도 반경 안에 본체가 있음
      const rx = mr.width * 0.42;
      const ry = mr.height * 0.42;
      const dx = cx - mcx;
      const dy = cy - mcy;
      // 타원 방정식: (dx/rx)^2 + (dy/ry)^2 <= 1
      return (dx*dx)/(rx*rx) + (dy*dy)/(ry*ry) <= 1;
    };

    const onMove = (e) => {
      if (!dragging) return;
      e.preventDefault();
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      tool.style.left = (cx - originalRect.width/2) + 'px';
      tool.style.top = (cy - originalRect.height/2) + 'px';

      // 광물 본체 영역 위에 있는지 검사
      const overMineral = isOverMineral(cx, cy);

      if (overMineral) {
        target.classList.add('hover-tool');
        const cr = canvas.getBoundingClientRect();
        const px = (cx - cr.left) * (canvas.width / cr.width);
        const py = (cy - cr.top) * (canvas.height / cr.height);

        if (state.hardness.tool > state.hardness.target) {
          // === 도구가 더 단단함 → 대상 광물에 흠집 ===
          // 실험 2: 석영(도구) → 방해석(대상) 긁힘. 방해석의 조흔색 = 흰색 → 가루도 흰색
          state.scratchTime++;
          // 흠집선: 광물 표면에 깊이감을 주는 자국 (살짝 어둡게 그러나 너무 갈색이지 않게)
          ctx.strokeStyle = 'rgba(180, 175, 165, 0.55)';
          ctx.lineWidth = 6 + Math.random() * 4;
          ctx.lineCap = 'round';
          if (lastX !== null) {
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(px, py);
            ctx.stroke();
          }
          // 흰색 가루 (방해석의 조흔색은 흰색이므로) - 메인
          ctx.fillStyle = 'rgba(255, 252, 245, 0.95)';
          for (let i = 0; i < 6; i++) {
            ctx.beginPath();
            ctx.arc(px + (Math.random()-0.5)*22, py + (Math.random()-0.5)*22, Math.random()*2.2 + 0.5, 0, Math.PI*2);
            ctx.fill();
          }
          // 살짝 옅은 흰색 가루 (대비)
          ctx.fillStyle = 'rgba(245, 242, 232, 0.7)';
          for (let i = 0; i < 4; i++) {
            ctx.beginPath();
            ctx.arc(px + (Math.random()-0.5)*28, py + (Math.random()-0.5)*28, Math.random()*1.8, 0, Math.PI*2);
            ctx.fill();
          }
          if (state.scratchTime % 4 === 0) playSound('scratch');
        } else {
          // === 도구가 더 부드러움 (실험 1: 방해석 도구 → 석영 대상) → 도구(방해석)가 닳음 ===
          state.scratchTime++;
          toolWearLevel = Math.min(100, toolWearLevel + 1.5);

          // 도구(방해석)가 닳는 시각효과 - 점점 흐려지면서 약간 작아짐
          const wearOpacity = 1 - (toolWearLevel / 100) * 0.35;
          const wearScale = 1.15 - (toolWearLevel / 100) * 0.12;
          tool.style.opacity = wearOpacity;
          tool.style.transform = `scale(${wearScale})`;

          // 방해석 가루(흰색)가 석영 표면에서 떨어지는 효과
          // 메인 흰색 가루
          ctx.fillStyle = 'rgba(255, 253, 248, 0.9)';
          for (let i = 0; i < 6; i++) {
            const ox = (Math.random()-0.5) * 32;
            const oy = (Math.random()-0.5) * 14;
            ctx.beginPath();
            ctx.arc(px + ox, py + oy, Math.random()*2 + 0.6, 0, Math.PI*2);
            ctx.fill();
          }
          // 옅은 흰색 (밝은 잔여물)
          ctx.fillStyle = 'rgba(248, 245, 238, 0.6)';
          for (let i = 0; i < 4; i++) {
            ctx.beginPath();
            ctx.arc(px + (Math.random()-0.5)*44, py + (Math.random()-0.5)*10, Math.random()*1.4, 0, Math.PI*2);
            ctx.fill();
          }
          if (state.scratchTime % 5 === 0) playSound('scratch');

          // 일정 이상 닳으면 도구 경고 표시
          if (toolWearLevel > 30 && toolWarning) {
            toolWarning.classList.add('show');
          }
        }
        lastX = px; lastY = py;
      } else {
        target.classList.remove('hover-tool');
        lastX = null; lastY = null;
        // 광물 영역 밖에서는 어떤 효과도 일어나지 않음
      }
    };

    const onEnd = () => {
      if (!dragging) return;
      dragging = false;
      tool.classList.remove('dragging');
      target.classList.remove('hover-tool');
      if (placeholder && placeholder.parentNode) {
        placeholder.parentNode.replaceChild(tool, placeholder);
      }
      tool.style.position = '';
      tool.style.left = '';
      tool.style.top = '';
      tool.style.zIndex = '';
      tool.style.width = '';
      tool.style.height = '';
      lastX = null; lastY = null;

      // 충분히 문질렀으면 결과 처리
      if (!state.done && state.scratchTime >= 8) {
        state.done = true;
        if (state.hardness.tool > state.hardness.target) {
          fb.classList.add('show', 'success');
          if (expNum === 2) {
            fb.innerHTML = `✏️ <strong>방해석에 선명한 흠집!</strong> 석영(굳기 7)이 방해석(굳기 3)을 쉽게 긁어 깊은 흠집을 만듭니다. <strong>굳기가 큰 광물이 작은 광물에 흠집을 낼 수 있어요.</strong>`;
          }
          playSound('success');
        } else {
          fb.classList.add('show', 'error');
          if (expNum === 1) {
            fb.innerHTML = `🔍 <strong>석영은 긁히지 않아요!</strong> 방해석(굳기 3)이 석영(굳기 7)보다 부드러워서 석영에는 흠집이 나지 않습니다. <strong>오히려 방해석이 닳아 가루가 떨어지는 게 보였나요?</strong> 굳기가 작은 광물이 큰 광물을 만나면 자기가 깎입니다.`;
          }
          playSound('error');
          // 방해석이 많이 닳은 상태로 고정
          tool.style.opacity = 1 - (toolWearLevel / 100) * 0.3;
        }

        if (expNum === 1) {
          // 실험 1 완료 → 실험 2 활성화
          setTimeout(() => {
            const exp2 = stage.querySelector('#exp2Section');
            exp2.style.opacity = '1';
            exp2.style.pointerEvents = 'auto';
            exp2.scrollIntoView({behavior:'smooth', block:'nearest'});
          }, 800);
        } else if (expNum === 2) {
          setTimeout(() => {
            stage.querySelector('#quizSection').hidden = false;
            stage.querySelector('#quizSection').scrollIntoView({behavior:'smooth', block:'nearest'});
          }, 800);
        }
      } else {
        // 닳은 상태 유지 (실험 미완료여도)
        if (toolWearLevel > 0 && state.hardness.tool < state.hardness.target) {
          tool.style.opacity = 1 - (toolWearLevel / 100) * 0.3;
        } else {
          tool.style.transform = '';
          tool.style.opacity = '';
        }
      }
    };

    tool.addEventListener('mousedown', onStart);
    tool.addEventListener('touchstart', onStart, {passive: false});
    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove, {passive: false});
    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchend', onEnd);
    document.addEventListener('touchcancel', onEnd);
  };

  setupHardnessExp(1);
  setupHardnessExp(2);

  stage.querySelectorAll('#hardnessQuiz .quiz-option').forEach(btn => {
    btn.addEventListener('click', () => {
      if (STATE.hardnessQuizAnswered) return;
      STATE.hardnessQuizAnswered = true;
      stage.querySelectorAll('#hardnessQuiz .quiz-option').forEach(b => b.disabled = true);
      const fb = stage.querySelector('#quizFb');
      if (btn.dataset.correct === 'true') {
        btn.classList.add('correct');
        fb.classList.add('show','success');
        fb.innerHTML = '🎉 <strong>정답!</strong> 더 단단한 광물이 부드러운 광물에 흠집을 냅니다. 이런 방법으로 두 광물의 굳기를 비교할 수 있어요.';
        STATE.scores.quiz++;
        playSound('success');
      } else {
        btn.classList.add('wrong');
        stage.querySelectorAll('#hardnessQuiz .quiz-option').forEach(b => {
          if (b.dataset.correct === 'true') b.classList.add('correct');
        });
        fb.classList.add('show','error');
        fb.innerHTML = '🔍 <strong>다시 생각해보세요.</strong> 석영이 방해석에 흠집을 낼 수 있다는 점, 그리고 방해석이 석영을 긁지 못한다는 점을 떠올려보세요.';
        playSound('error');
      }
      stage.querySelector('#toStage7').disabled = false;
    });
  });

  stage.querySelector('#toStage7').addEventListener('click', () => goToStage(7));
}

  // ===== 활동 2 =====
  const a2Items = [
    {label:'① 묽은 염산을 떨어뜨려 거품 발생 여부 확인', correct:true},
    {label:'② 클립이 달라붙는지 확인', correct:false},
    {label:'③ 두 광물을 서로 긁어 굳기 비교', correct:true},
    {label:'④ 조흔판에 긁었을 때 조흔색이 나타나는지 확인 (석영은 안 긁힘, 방해석은 흰색 조흔색)', correct:true},
    {label:'⑤ 겉보기 색으로 구별 (둘 다 흰색~무색)', correct:false}
  ];
  const a2Container = stage.querySelector('#a2Options');
  a2Items.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'safety-item';
    div.style.cursor = 'pointer';
    div.innerHTML = `
      <div class="safety-checkbox" id="a2cb-${i}"></div>
      <div class="safety-text">${item.label}</div>
    `;
    div.addEventListener('click', () => {
      div.classList.toggle('checked');
      const cb = div.querySelector('.safety-checkbox');
      cb.innerHTML = div.classList.contains('checked') ? '✓' : '';
      playSound('click');
    });
    a2Container.appendChild(div);
  });
  stage.querySelector('#a2SubmitBtn').addEventListener('click', () => {
    const fb = stage.querySelector('#a2Fb');
    const selected = [];
    a2Container.querySelectorAll('.safety-item').forEach((el, i) => {
      if (el.classList.contains('checked')) selected.push(i);
    });
    const correctIdx = a2Items.map((it, i) => it.correct ? i : -1).filter(i => i >= 0);
    const isPerfect = selected.length === correctIdx.length && selected.every(s => correctIdx.includes(s));
    a2Container.querySelectorAll('.safety-item').forEach((el, i) => {
      if (a2Items[i].correct) {
        el.style.borderColor = 'var(--success)';
        el.style.background = 'rgba(74,124,89,0.1)';
      }
    });
    if (isPerfect) {
      fb.classList.add('show','success');
      fb.classList.remove('error');
      fb.innerHTML = `🎯 <strong>완벽해요!</strong> 석영과 방해석은 겉보기 색이 비슷하지만, <strong>굳기(석영 7, 방해석 3)</strong>, <strong>염산 반응(방해석만 거품 발생)</strong>, <strong>조흔판 긁힘 여부(석영은 긁히지 않음)</strong> 등으로 명확하게 구별할 수 있습니다.`;
      STATE.scores.summary++;
      playSound('success');
    } else {
      fb.classList.add('show','error');
      fb.classList.remove('success');
      fb.innerHTML = `🔍 정답은 <strong>①, ③, ④</strong>입니다. 자성(②)은 자철석에만 해당하고, 겉보기 색(⑤)은 둘 다 비슷해서 구별이 어렵습니다.`;
      playSound('error');
    }
    STATE.summaryAnswers.a2 = selected;
  });

  // ===== 활동 3: 카드 옮기기 =====
  const PAIRS = [
    {
      ids: ['magnetite','hematite'],
      attrs: [
        {key:'겉보기 색', target0:'검은색(금속광택)', target1:'검붉은색~흑회색'},
        {key:'조흔색', target0:'검은색', target1:'붉은색'},
        {key:'자성', target0:'강한 자성', target1:'약함(거의 없음)'},
        {key:'염산 반응', target0:'반응 없음', target1:'반응 없음'},
        {key:'굳기', target0:'5.5~6.5', target1:'5.5~6.5'}
      ],
      common: '두 광물 모두 검은 계열의 겉보기 색을 띠고, 굳기가 비슷하며, 염산에 반응하지 않습니다.',
      diff: '조흔색(자철석=검은색, 적철석=붉은색)과 자성(자철석=강함, 적철석=약함)으로 구별할 수 있습니다.'
    },
    {
      ids: ['pyrite','chalcopyrite'],
      attrs: [
        {key:'겉보기 색', target0:'황동색(금속광택)', target1:'황동색(금속광택)'},
        {key:'조흔색', target0:'검은색', target1:'녹흑색'},
        {key:'자성', target0:'없음', target1:'없음'},
        {key:'염산 반응', target0:'반응 없음', target1:'반응 없음'},
        {key:'굳기', target0:'6~6.5', target1:'3.5~4'}
      ],
      common: '두 광물 모두 황동색 금속광택을 띠고, 자성과 염산 반응이 없습니다.',
      diff: '조흔색(황철석=검은색, 황동석=녹흑색)과 굳기(황철석 6~6.5, 황동석 3.5~4)로 구별할 수 있습니다.'
    },
    {
      ids: ['quartz','calcite'],
      attrs: [
        {key:'겉보기 색', target0:'무색~흰색(투명)', target1:'흰색~무색'},
        {key:'조흔색', target0:'긁히지 않음', target1:'흰색'},
        {key:'자성', target0:'없음', target1:'없음'},
        {key:'염산 반응', target0:'반응 없음', target1:'거품 발생(CO₂)'},
        {key:'굳기', target0:'7', target1:'3'}
      ],
      common: '두 광물 모두 흰색~무색의 겉보기 색을 띠고, 자성이 없습니다.',
      diff: '굳기(석영 7, 방해석 3), 염산 반응(방해석만 거품 발생), 조흔판 긁힘 여부로 구별할 수 있습니다.'
    }
  ];

  const renderPair = (pairIdx) => {
    STATE.summaryAnswers.a3.currentPair = pairIdx;
    const area = stage.querySelector('#cardMatchArea');
    const pair = PAIRS[pairIdx];
    const m0 = MINERALS[pair.ids[0]];
    const m1 = MINERALS[pair.ids[1]];
    const allAttrs = [];
    pair.attrs.forEach(a => {
      allAttrs.push({key:a.key, value:a.target0, mineral:0});
      allAttrs.push({key:a.key, value:a.target1, mineral:1});
    });
    for (let i = allAttrs.length-1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i+1));
      [allAttrs[i], allAttrs[j]] = [allAttrs[j], allAttrs[i]];
    }

    area.innerHTML = `
      <div class="compare-slots">
        <div class="compare-slot filled">
          <div style="width:100px; height:100px; margin:0 auto;">${renderMineralSVG(pair.ids[0],'large')}</div>
          <div class="mineral-name">${m0.name}</div>
          <div class="mineral-formula">${m0.formula}</div>
          <div class="attr-drop-zone" data-mineral="0" id="dropZone0"></div>
        </div>
        <div class="compare-slot filled">
          <div style="width:100px; height:100px; margin:0 auto;">${renderMineralSVG(pair.ids[1],'large')}</div>
          <div class="mineral-name">${m1.name}</div>
          <div class="mineral-formula">${m1.formula}</div>
          <div class="attr-drop-zone" data-mineral="1" id="dropZone1"></div>
        </div>
      </div>
      <h4 style="margin:14px 0 8px; font-size:13px; color:var(--text-muted);">⬇️ 아래 특성 카드를 알맞은 광물 칸으로 드래그 (또는 클릭)하세요:</h4>
      <div class="attribute-cards" id="attrPool"></div>
      <div id="pairResult" style="display:none; margin-top:14px;"></div>
    `;

    const pool = area.querySelector('#attrPool');
    allAttrs.forEach((a, i) => {
      const card = document.createElement('div');
      card.className = 'attr-card';
      card.draggable = true;
      card.style.position = 'relative';
      card.dataset.attrIdx = i;
      card.dataset.mineral = a.mineral;
      card.dataset.key = a.key;
      card.dataset.value = a.value;
      card.innerHTML = `<strong>${a.key}:</strong> ${a.value}`;
      card.addEventListener('dragstart', (e) => {
        e.dataTransfer.setData('text/plain', i);
        card.classList.add('dragging');
      });
      card.addEventListener('dragend', () => card.classList.remove('dragging'));
      card.addEventListener('click', () => {
        if (card.classList.contains('placed')) return;
        if (card.querySelector('.confirm-tip')) return;
        const tip = document.createElement('div');
        tip.className = 'confirm-tip';
        tip.style.cssText = 'position:absolute; top:100%; left:50%; transform:translateX(-50%); margin-top:4px; background:var(--bg-card); border:2px solid var(--accent-primary); padding:6px; border-radius:8px; z-index:100; display:flex; gap:6px; box-shadow:var(--shadow-md); white-space:nowrap;';
        tip.innerHTML = `<button class="btn" data-target="0" style="padding:4px 8px; font-size:11px;">← ${m0.name}</button><button class="btn" data-target="1" style="padding:4px 8px; font-size:11px;">${m1.name} →</button>`;
        card.appendChild(tip);
        tip.querySelectorAll('button').forEach(b => {
          b.addEventListener('click', (ev) => {
            ev.stopPropagation();
            placeAttr(card, b.dataset.target);
            tip.remove();
          });
        });
        setTimeout(() => { if (tip.parentNode) tip.remove(); }, 5000);
      });
      pool.appendChild(card);
    });

    [0,1].forEach(idx => {
      const zone = area.querySelector(`#dropZone${idx}`);
      zone.addEventListener('dragover', (e) => {
        e.preventDefault();
        zone.classList.add('drag-over');
      });
      zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
      zone.addEventListener('drop', (e) => {
        e.preventDefault();
        zone.classList.remove('drag-over');
        const cardIdx = e.dataTransfer.getData('text/plain');
        const card = pool.querySelector(`[data-attr-idx="${cardIdx}"]`);
        if (card) placeAttr(card, idx);
      });
    });

    const placeAttr = (card, targetIdx) => {
      const correct = card.dataset.mineral == targetIdx;
      const zone = area.querySelector(`#dropZone${targetIdx}`);

      if (correct) {
        // 정답: 그대로 배치
        const placedCard = card.cloneNode(true);
        placedCard.removeAttribute('draggable');
        placedCard.classList.remove('dragging');
        const tip = placedCard.querySelector('.confirm-tip');
        if (tip) tip.remove();
        placedCard.classList.add('correct');
        zone.appendChild(placedCard);
        card.classList.add('placed');
        card.style.pointerEvents = 'none';
        playSound('match');
        STATE.scores.matching++;
      } else {
        // 오답: 빨간색 + 흔들림 표시. 클릭하면 풀로 복귀
        const errorClone = card.cloneNode(true);
        errorClone.removeAttribute('draggable');
        const tip = errorClone.querySelector('.confirm-tip');
        if (tip) tip.remove();
        errorClone.classList.add('wrong', 'shake');
        errorClone.style.position = 'relative';
        errorClone.style.cursor = 'pointer';
        errorClone.title = '클릭하면 다시 시도할 수 있어요';

        // 안내 라벨 추가
        const hintLabel = document.createElement('div');
        hintLabel.style.cssText = 'font-size:10px; margin-top:4px; color:white; font-weight:600;';
        hintLabel.textContent = '👆 클릭하면 다시 시도';
        errorClone.appendChild(hintLabel);

        zone.appendChild(errorClone);
        playSound('error');

        // 클릭 시 풀로 복귀
        const returnToPool = () => {
          errorClone.style.transition = 'opacity 0.3s, transform 0.3s';
          errorClone.style.opacity = '0';
          errorClone.style.transform = 'scale(0.8)';
          setTimeout(() => {
            errorClone.remove();
            // 풀 카드를 다시 활성화 (이미 풀에 있음 - placed 클래스 없음)
            card.classList.remove('placed'); // 혹시나
            card.style.pointerEvents = '';
            // 약간의 어필 효과
            card.style.transition = 'transform 0.2s';
            card.style.transform = 'scale(1.1)';
            setTimeout(() => { card.style.transform = ''; }, 200);
            playSound('click');
          }, 320);
        };
        errorClone.addEventListener('click', returnToPool);
        // 자동 복귀도 5초 후 안전망으로
        setTimeout(() => {
          if (errorClone.parentNode) returnToPool();
        }, 5000);
        return;
      }

      const remaining = pool.querySelectorAll('.attr-card:not(.placed)').length;
      if (remaining === 0) {
        const correctCount = area.querySelectorAll('#dropZone0 .attr-card.correct, #dropZone1 .attr-card.correct').length;
        const total = pair.attrs.length * 2;
        const resultDiv = area.querySelector('#pairResult');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
          <div class="feedback-banner show success" style="background:rgba(74,124,89,0.1);">
            <strong>✅ ${m0.name} vs ${m1.name} 비교 완료!</strong> (정답률: ${correctCount}/${total})
          </div>
          <table class="compare-table">
            <thead><tr><th>특성</th><th>${m0.name}</th><th>${m1.name}</th></tr></thead>
            <tbody>
              ${pair.attrs.map(a => `<tr><td><strong>${a.key}</strong></td><td>${a.target0}</td><td>${a.target1}</td></tr>`).join('')}
            </tbody>
          </table>
          <div class="info-box" style="margin-top:12px;">
            <strong>🤝 공통점:</strong> ${pair.common}<br>
            <strong>🔀 차이점:</strong> ${pair.diff}
          </div>
        `;
        STATE.summaryAnswers.a3[`pair${pairIdx+1}Done`] = true;
        if (correctCount === total) {
          playSound('fanfare');
          launchConfetti(0.5);
        }
      }
    };
  };

  stage.querySelectorAll('.pair-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      stage.querySelectorAll('.pair-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderPair(parseInt(tab.dataset.pair));
    });
  });
  const activeStyle = document.createElement('style');
  activeStyle.textContent = `.pair-tab.active { background: var(--accent-primary) !important; color: white !important; border-color: var(--accent-primary) !important; }`;
  document.head.appendChild(activeStyle);

  renderPair(0);

  // ===== 활동 4: 플로우차트 + 빈칸 =====
  stage.querySelector('#flowchartContainer').innerHTML = `<div class="flowchart-svg-wrapper">${renderFlowchartSVG()}</div>`;

  stage.querySelector('#a4SubmitBtn').addEventListener('click', () => {
    const inputs = stage.querySelectorAll('.fill-blank-input');
    let correctCount = 0;
    const total = inputs.length;
    const fb = stage.querySelector('#a4Fb');
    const synonyms = {
      0: ['조흔색','조흔'],
      1: ['염산 반응','염산','HCl','염산반응','거품'],
      2: ['자성','자기'],
      3: ['굳기','경도'],
      4: ['겉보기 색','겉보기색','겉보기'],
      5: ['고유한','고유의','각각의 고유한','각각의','특유의','특별한']
    };
    inputs.forEach((inp, i) => {
      const v = inp.value.trim();
      const accepted = synonyms[i] || [];
      const isOk = v.length >= 1 && accepted.some(a => v === a || v.includes(a) || (a.includes(v) && v.length >= 2));
      if (isOk) {
        inp.classList.add('correct');
        inp.classList.remove('wrong');
        correctCount++;
      } else {
        inp.classList.add('wrong');
        inp.classList.remove('correct');
      }
      STATE.summaryAnswers.a4.blanks[i] = v;
    });
    STATE.summaryAnswers.a4.correctCount = correctCount;
    if (correctCount === total) {
      fb.classList.add('show','success');
      fb.classList.remove('error');
      fb.innerHTML = `🏆 <strong>광물 박사 등극!</strong> 모든 빈칸을 정확히 채웠어요. 광물 구별의 핵심을 완벽히 이해했네요!<br><span class="badge">🏆 광물 박사</span>`;
      STATE.scores.summary++;
      playSound('fanfare');
      launchConfetti(1.0);
    } else {
      fb.classList.add('show','error');
      fb.classList.remove('success');
      fb.innerHTML = `📝 ${correctCount}/${total} 정답. 정답: ① 조흔색 / ② 염산 반응 / ③ 자성 / ④ 굳기 / ⑤ 겉보기 색 / ⑥ 고유한`;
      playSound('error');
    }
  });

  stage.querySelector('#toStage8').addEventListener('click', () => goToStage(8));
}

function renderFlowchartSVG() {
  return `
    <svg class="flowchart-svg" viewBox="0 0 900 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="광물 구별 플로우차트">
      <title>광물 구별 플로우차트</title>
      <desc>미지의 광물을 염산 반응, 자성, 조흔색 검사로 구별하는 결정 흐름도</desc>
      <defs>
        <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
          <path d="M0,0 L0,6 L9,3 z" fill="var(--accent-tertiary)"/>
        </marker>
        <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">

      <!-- ===== 시작 노드 ===== -->
      <rect x="360" y="20" width="180" height="50" rx="25" fill="var(--accent-primary)" stroke="var(--accent-primary)"/>
      <text x="450" y="50" text-anchor="middle" dominant-baseline="central" fill="white" font-size="17" font-weight="bold" font-family="'Black Han Sans',sans-serif">미지의 광물</text>

      <line x1="450" y1="70" x2="450" y2="98" stroke="var(--accent-tertiary)" stroke-width="2" marker-end="url(#arr)"/>

      <!-- ===== Step 1: 염산 검사 ===== -->
      <rect x="350" y="100" width="200" height="48" rx="10" fill="url(#boxGrad)" stroke="var(--accent-secondary)" stroke-width="2"/>
      <text x="450" y="124" text-anchor="middle" dominant-baseline="central" fill="var(--text-primary)" font-size="14" font-weight="600">① 묽은 염산 떨어뜨림</text>

      <!-- 분기 -->
      <path d="M 410 148 L 410 175 L 230 175 L 230 200" stroke="var(--accent-tertiary)" stroke-width="2" fill="none" marker-end="url(#arr)"/>
      <path d="M 490 148 L 490 175 L 670 175 L 670 200" stroke="var(--accent-tertiary)" stroke-width="2" fill="none" marker-end="url(#arr)"/>

      <!-- 거품 O → 방해석 (최종 식별) -->
      <rect x="130" y="202" width="200" height="50" rx="10" fill="rgba(74,124,89,0.18)" stroke="var(--accent-tertiary)" stroke-width="2.5"/>
      <text x="230" y="220" text-anchor="middle" dominant-baseline="central" fill="var(--text-primary)" font-size="13" font-weight="600">거품 O</text>
      <text x="230" y="240" text-anchor="middle" dominant-baseline="central" fill="var(--accent-primary)" font-size="14" font-weight="700">→ 방해석</text>

      <!-- 거품 X → 다음 단계 -->
      <rect x="570" y="202" width="200" height="48" rx="10" fill="url(#boxGrad)" stroke="var(--accent-secondary)" stroke-width="2"/>
      <text x="670" y="226" text-anchor="middle" dominant-baseline="central" fill="var(--text-primary)" font-size="14" font-weight="600">거품 X</text>

      <line x1="670" y1="250" x2="670" y2="278" stroke="var(--accent-tertiary)" stroke-width="2" marker-end="url(#arr)"/>

      <!-- ===== Step 2: 자성 검사 ===== -->
      <rect x="570" y="280" width="200" height="48" rx="10" fill="url(#boxGrad)" stroke="var(--accent-secondary)" stroke-width="2"/>
      <text x="670" y="304" text-anchor="middle" dominant-baseline="central" fill="var(--text-primary)" font-size="14" font-weight="600">② 클립을 가까이</text>

      <!-- 분기 -->
      <path d="M 620 328 L 620 355 L 470 355 L 470 380" stroke="var(--accent-tertiary)" stroke-width="2" fill="none" marker-end="url(#arr)"/>
      <path d="M 720 328 L 720 355 L 720 380" stroke="var(--accent-tertiary)" stroke-width="2" fill="none" marker-end="url(#arr)"/>

      <!-- 강하게 붙음 → 자철석 -->
      <rect x="370" y="382" width="200" height="50" rx="10" fill="rgba(74,124,89,0.18)" stroke="var(--accent-tertiary)" stroke-width="2.5"/>
      <text x="470" y="400" text-anchor="middle" dominant-baseline="central" fill="var(--text-primary)" font-size="13" font-weight="600">강하게 붙음</text>
      <text x="470" y="420" text-anchor="middle" dominant-baseline="central" fill="var(--accent-primary)" font-size="14" font-weight="700">→ 자철석</text>

      <!-- 안 붙음 → 다음 단계 -->
      <rect x="620" y="382" width="200" height="48" rx="10" fill="url(#boxGrad)" stroke="var(--accent-secondary)" stroke-width="2"/>

// ============== 컨페티 ==============
function launchConfetti(intensity = 1) {
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const particles = [];
  const colors = ['#c8472b','#d4a04c','#4a7c59','#e8b85c','#9c3a28'];
  const count = Math.floor(80 * intensity);
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: -20,
      vx: (Math.random() - 0.5) * 6,
      vy: 2 + Math.random() * 4,
      size: 6 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 0.2
    });
  }
  let frame = 0;
  const animate = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    particles.forEach(p => {
      if (p.y < canvas.height + 20) {
        alive = true;
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1;
        p.rot += p.vr;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
        ctx.restore();
      }
    });
    frame++;
    if (alive && frame < 300) requestAnimationFrame(animate);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  };
  animate();
}

// ============== PDF 다운로드 ==============
async function downloadPDF() {
  try {
    const btn = document.getElementById('downloadPdfBtn');
    btn.disabled = true;
    btn.textContent = '⏳ PDF 생성 중...';

    const card = document.getElementById('reportCard');
    const canvas = await html2canvas(card, {
      backgroundColor: getCSSVar('--bg-card') || '#ffffff',
      scale: 1.5,
      useCORS: true
    });
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pdfW = 210, pdfH = 297;
    const imgW = pdfW;
    const imgH = (canvas.height * imgW) / canvas.width;
    let posY = 0;
    let remaining = imgH;
    pdf.addImage(imgData, 'PNG', 0, posY, imgW, imgH);
    while (remaining > pdfH) {
      posY -= pdfH;
      remaining -= pdfH;
      pdf.addPage();
      pdf.addImage(imgData, 'PNG', 0, posY, imgW, imgH);
    }
    const date = new Date().toISOString().slice(0,10);
    pdf.save(`송쌤과학_광물특성_보고서_${date}.pdf`);

    btn.disabled = false;
    btn.textContent = '📄 PDF 다운로드';
    playSound('success');
  } catch (err) {
    console.error(err);
    alert('PDF 생성 중 오류가 발생했습니다: ' + err.message);
    document.getElementById('downloadPdfBtn').disabled = false;
    document.getElementById('downloadPdfBtn').textContent = '📄 PDF 다운로드';
  }
}
