<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>송쌤과학 가상실험실 - 광물의 특성 관찰</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Black+Han+Sans&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg-primary: #f5f1e8;
  --bg-secondary: #faf6ed;
  --bg-card: #ffffff;
  --bg-accent: #e8dfc8;
  --text-primary: #2a2a2a;
  --text-secondary: #5a5a5a;
  --text-muted: #8a8a8a;
  --accent-primary: #c8472b;
  --accent-secondary: #d4a04c;
  --accent-tertiary: #4a7c59;
  --border-color: #d4c9a8;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.1);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.15);
  --success: #4a7c59;
  --error: #c8472b;
  --warning: #d4a04c;
}

[data-theme="dark"] {
  --bg-primary: #1a1814;
  --bg-secondary: #252320;
  --bg-card: #2d2a25;
  --bg-accent: #3a352d;
  --text-primary: #f0ebe0;
  --text-secondary: #b8b0a0;
  --text-muted: #807a6e;
  --accent-primary: #e85a3d;
  --accent-secondary: #e8b85c;
  --accent-tertiary: #6a9c79;
  --border-color: #4a4438;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Gowun Dodum', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
  background-image:
    radial-gradient(circle at 20% 10%, rgba(200,71,43,0.04) 0%, transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(74,124,89,0.04) 0%, transparent 40%);
}

[data-theme="dark"] body {
  background-image:
    radial-gradient(circle at 20% 10%, rgba(232,90,61,0.08) 0%, transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(106,156,121,0.06) 0%, transparent 40%);
}

.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 20px;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0;
  border-bottom: 2px solid var(--border-color);
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 16px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.brand-icon {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  box-shadow: var(--shadow-md);
  transform: rotate(-3deg);
}

.brand-text h1 {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 26px;
  letter-spacing: -0.5px;
  color: var(--text-primary);
  font-weight: 400;
}

.brand-text p {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
}

.header-controls {
  display: flex;
  gap: 10px;
  align-items: center;
}

.btn {
  padding: 10px 18px;
  border: 2px solid var(--border-color);
  background: var(--bg-card);
  color: var(--text-primary);
  border-radius: 10px;
  font-family: inherit;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-weight: 500;
}

.btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.btn-primary {
  background: var(--accent-primary);
  color: white;
  border-color: var(--accent-primary);
}

.btn-primary:hover { background: var(--accent-primary); filter: brightness(1.1); }

.btn-secondary {
  background: var(--accent-tertiary);
  color: white;
  border-color: var(--accent-tertiary);
}

/* PROGRESS BAR */
.progress-container {
  background: var(--bg-card);
  border: 2px solid var(--border-color);
  border-radius: 14px;
  padding: 16px 20px;
  margin-bottom: 24px;
  box-shadow: var(--shadow-sm);
}

.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 500;
}

.progress-steps {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.step-pill {
  flex: 1;
  min-width: 60px;
  padding: 8px 6px;
  background: var(--bg-accent);
  border-radius: 8px;
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  transition: all 0.3s;
  border: 2px solid transparent;
}

.step-pill.active {
  background: var(--accent-primary);
  color: white;
  border-color: var(--accent-primary);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.step-pill.done {
  background: var(--accent-tertiary);
  color: white;
  border-color: var(--accent-tertiary);
}

.step-pill.skipped {
  background: var(--bg-card);
  color: var(--text-muted);
  border: 2px dashed var(--text-muted);
  text-decoration: line-through;
  opacity: 0.7;
}

.btn-skip {
  background: transparent;
  color: var(--text-muted);
  border: 1px dashed var(--text-muted);
  font-size: 13px;
  padding: 8px 14px;
}
.btn-skip:hover { color: var(--accent-primary); border-color: var(--accent-primary); border-style: solid; }

/* MAIN CONTENT */
.stage {
  display: none;
  animation: fadeIn 0.5s ease;
}

.stage.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.stage-card {
  background: var(--bg-card);
  border: 2px solid var(--border-color);
  border-radius: 20px;
  padding: 32px;
  box-shadow: var(--shadow-md);
  margin-bottom: 20px;
}

.stage-title {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 28px;
  font-weight: 400;
  color: var(--text-primary);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.stage-number {
  display: inline-block;
  background: var(--accent-primary);
  color: white;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 14px;
  font-family: 'Gowun Dodum', sans-serif;
}

.stage-subtitle {
  color: var(--text-secondary);
  font-size: 15px;
  margin-bottom: 24px;
  line-height: 1.6;
}

/* SAFETY CHECKLIST */
.safety-list {
  background: linear-gradient(135deg, rgba(212,160,76,0.1), rgba(200,71,43,0.05));
  border: 2px dashed var(--accent-secondary);
  border-radius: 14px;
  padding: 24px;
  margin: 20px 0;
}

.safety-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px;
  background: var(--bg-card);
  border-radius: 10px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.2s;
  border: 2px solid transparent;
}

.safety-item:hover { background: var(--bg-secondary); border-color: var(--accent-secondary); }
.safety-item.checked { border-color: var(--success); background: rgba(74,124,89,0.08); }

.safety-checkbox {
  width: 26px;
  height: 26px;
  border: 2px solid var(--border-color);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}

.safety-item.checked .safety-checkbox {
  background: var(--success);
  border-color: var(--success);
  color: white;
}

.safety-text { font-size: 15px; color: var(--text-primary); }

/* MINERAL TRAY */
.mineral-tray {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 18px;
  margin: 24px 0;
}

.mineral-card {
  background: var(--bg-secondary);
  border: 2px solid var(--border-color);
  border-radius: 16px;
  padding: 18px;
  cursor: pointer;
  transition: all 0.3s;
  text-align: center;
  position: relative;
}

.mineral-card:hover {
  transform: translateY(-4px);
  border-color: var(--accent-primary);
  box-shadow: var(--shadow-md);
}

.mineral-card.selected {
  border-color: var(--accent-primary);
  background: linear-gradient(135deg, rgba(200,71,43,0.05), rgba(212,160,76,0.05));
  box-shadow: var(--shadow-lg);
}

.mineral-card.observed::after {
  content: "✓";
  position: absolute;
  top: 8px;
  right: 8px;
  width: 24px;
  height: 24px;
  background: var(--success);
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: bold;
}

.mineral-svg {
  width: 100%;
  height: 110px;
  border-radius: 10px;
  margin-bottom: 12px;
  background: var(--bg-accent);
  overflow: hidden;
}

.mineral-name {
  font-family: 'Black Han Sans', sans-serif;
  font-weight: 400;
  font-size: 18px;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.mineral-formula {
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'Gowun Dodum', sans-serif;
}

/* INFO BOX */
.info-box {
  background: linear-gradient(135deg, rgba(74,124,89,0.08), rgba(74,124,89,0.02));
  border-left: 4px solid var(--accent-tertiary);
  padding: 16px 20px;
  border-radius: 8px;
  margin: 16px 0;
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.info-box.warning {
  background: linear-gradient(135deg, rgba(212,160,76,0.1), rgba(212,160,76,0.02));
  border-left-color: var(--accent-secondary);
}

.info-box strong { color: var(--text-primary); }

/* OBSERVATION VIEW */
.obs-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  align-items: start;
}

@media (max-width: 768px) {
  .obs-container { grid-template-columns: 1fr; }
}

.obs-mineral-display {
  background: var(--bg-secondary);
  border: 2px solid var(--border-color);
  border-radius: 16px;
  padding: 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.obs-mineral-svg-wrap {
  width: 100%;
  height: 280px;
  background: radial-gradient(circle at center, var(--bg-accent), var(--bg-secondary));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
  cursor: grab;
  position: relative;
}

.obs-mineral-svg-wrap:active { cursor: grabbing; }

.color-options {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 16px;
}

.color-btn {
  padding: 14px 12px;
  border: 2px solid var(--border-color);
  background: var(--bg-card);
  border-radius: 10px;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 500;
}

.color-btn:hover { border-color: var(--accent-primary); transform: translateY(-2px); }
.color-btn.selected { background: var(--accent-primary); color: white; border-color: var(--accent-primary); }
.color-btn.correct { background: var(--success); color: white; border-color: var(--success); }
.color-btn.wrong { background: var(--error); color: white; border-color: var(--error); }

.color-swatch {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid rgba(0,0,0,0.1);
  flex-shrink: 0;
}

/* SCRATCH PLATE */
.streak-area {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin: 20px 0;
}

.streak-plate-wrap {
  text-align: center;
}

.streak-plate-label {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 8px;
  font-weight: 600;
}

.streak-plate {
  width: 100%;
  height: 180px;
  border-radius: 12px;
  border: 2px solid var(--border-color);
  cursor: crosshair;
  touch-action: none;
}

.streak-plate.white-plate { background: #ffffff; }
.streak-plate.black-plate { background: #1a1a1a; }

.draggable-mineral {
  display: inline-block;
  width: 80px;
  height: 80px;
  border-radius: 12px;
  margin: 16px auto;
  cursor: grab;
  border: 3px solid var(--accent-primary);
  box-shadow: var(--shadow-md);
}

.draggable-mineral:active { cursor: grabbing; }

/* CLIP MAGNETISM */
.magnetism-area {
  position: relative;
  height: 320px;
  background: var(--bg-secondary);
  border: 2px solid var(--border-color);
  border-radius: 14px;
  overflow: hidden;
  touch-action: none;
}

/* HCL DROPPER */
.hcl-area {
  position: relative;
  height: 360px;
  background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-accent) 100%);
  border: 2px solid var(--border-color);
  border-radius: 14px;
  overflow: hidden;
  cursor: crosshair;
}

/* HARDNESS COMPARE */
.hardness-area {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 20px;
  align-items: center;
  padding: 20px;
  background: var(--bg-secondary);
  border-radius: 14px;
  border: 2px solid var(--border-color);
  margin: 16px 0;
}

@media (max-width: 768px) {
  .hardness-area { grid-template-columns: 1fr; }
}

.hardness-mineral {
  padding: 16px;
  background: var(--bg-card);
  border-radius: 12px;
  text-align: center;
  border: 2px solid var(--border-color);
}

.hardness-vs {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 32px;
  color: var(--accent-primary);
  text-align: center;
}

/* MOHS SCALE */
.mohs-scale {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 4px;
  margin: 20px 0;
}

.mohs-item {
  padding: 12px 4px;
  text-align: center;
  font-size: 11px;
  background: var(--bg-secondary);
  border-radius: 6px;
  border: 2px solid var(--border-color);
  font-weight: 600;
  position: relative;
}

.mohs-item.has-mineral {
  background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
  color: white;
  border-color: var(--accent-primary);
}

.mohs-num {
  display: block;
  font-size: 18px;
  font-family: 'Black Han Sans', sans-serif;
  margin-bottom: 2px;
}

@media (max-width: 768px) {
  .mohs-scale { grid-template-columns: repeat(5, 1fr); }
}

/* QUIZ */
.quiz-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin: 16px 0;
}

.quiz-option {
  padding: 14px 18px;
  border: 2px solid var(--border-color);
  background: var(--bg-card);
  border-radius: 10px;
  cursor: pointer;
  font-family: inherit;
  font-size: 14px;
  text-align: left;
  transition: all 0.2s;
  line-height: 1.5;
}

.quiz-option:hover { border-color: var(--accent-primary); transform: translateX(4px); }
.quiz-option.selected { background: var(--accent-primary); color: white; border-color: var(--accent-primary); }
.quiz-option.correct { background: var(--success); color: white; border-color: var(--success); }
.quiz-option.wrong { background: var(--error); color: white; border-color: var(--error); }

/* TEXTAREA */
.text-input {
  width: 100%;
  padding: 14px;
  border: 2px solid var(--border-color);
  background: var(--bg-card);
  color: var(--text-primary);
  border-radius: 10px;
  font-family: inherit;
  font-size: 14px;
  resize: vertical;
  min-height: 80px;
  transition: border-color 0.2s;
}

.text-input:focus { outline: none; border-color: var(--accent-primary); }

/* FILL BLANK */
.fill-blank-input {
  display: inline-block;
  padding: 4px 10px;
  border: none;
  border-bottom: 2px solid var(--accent-primary);
  background: rgba(200,71,43,0.05);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  width: 100px;
  text-align: center;
  margin: 0 4px;
}

.fill-blank-input:focus { outline: none; background: rgba(200,71,43,0.15); }
.fill-blank-input.correct { border-bottom-color: var(--success); background: rgba(74,124,89,0.15); color: var(--success); }
.fill-blank-input.wrong { border-bottom-color: var(--error); background: rgba(200,71,43,0.15); color: var(--error); }

/* CARD MATCHING */
.card-match-area {
  background: var(--bg-secondary);
  border: 2px solid var(--border-color);
  border-radius: 14px;
  padding: 20px;
  margin: 16px 0;
}

.compare-slots {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin: 16px 0;
}

.compare-slot {
  background: var(--bg-card);
  border: 3px dashed var(--border-color);
  border-radius: 12px;
  padding: 16px;
  min-height: 180px;
  text-align: center;
  position: relative;
}

.compare-slot.filled { border-style: solid; border-color: var(--accent-primary); }

.slot-label {
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 12px;
  font-size: 13px;
}

.attribute-cards {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 16px;
  background: var(--bg-accent);
  border-radius: 10px;
  min-height: 80px;
  margin: 12px 0;
}

.attr-card {
  padding: 8px 14px;
  background: var(--bg-card);
  border: 2px solid var(--border-color);
  border-radius: 20px;
  font-size: 13px;
  cursor: grab;
  user-select: none;
  transition: all 0.2s;
  font-weight: 500;
}

.attr-card:hover { border-color: var(--accent-primary); transform: translateY(-2px); }
.attr-card.placed { opacity: 0.5; cursor: default; }
.attr-card.dragging { opacity: 0.6; }
.attr-card.correct { background: var(--success); color: white; border-color: var(--success); }
.attr-card.wrong { background: var(--error); color: white; border-color: var(--error); }
.attr-card.shake { animation: shakeX 0.4s ease; }
@keyframes shakeX {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-6px); }
  40%, 80% { transform: translateX(6px); }
}

.attr-drop-zone {
  margin-top: 12px;
  padding: 12px;
  background: var(--bg-secondary);
  border-radius: 10px;
  min-height: 60px;
  border: 2px dashed var(--border-color);
}

.attr-drop-zone.drag-over { border-color: var(--accent-primary); background: rgba(200,71,43,0.05); }

.compare-table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  background: var(--bg-card);
  border-radius: 10px;
  overflow: hidden;
}

.compare-table th, .compare-table td {
  padding: 12px;
  text-align: center;
  border-bottom: 1px solid var(--border-color);
  font-size: 14px;
}

.compare-table th {
  background: var(--accent-tertiary);
  color: white;
  font-weight: 600;
}

.compare-table tr:last-child td { border-bottom: none; }

/* RESULTS */
.result-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin: 20px 0;
}

.result-card {
  background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
  border: 2px solid var(--border-color);
  border-radius: 14px;
  padding: 20px;
  text-align: center;
}

.result-value {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 42px;
  color: var(--accent-primary);
  margin: 8px 0;
}

.result-label {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 600;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 32px 20px;
  margin-top: 40px;
  border-top: 2px solid var(--border-color);
  color: var(--text-muted);
}

.footer-links {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.footer-links a {
  color: var(--accent-primary);
  text-decoration: none;
  font-weight: 600;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.footer-links a:hover { text-decoration: underline; }

/* MODAL / FEEDBACK */
.feedback-banner {
  padding: 16px 20px;
  border-radius: 12px;
  margin: 16px 0;
  font-size: 15px;
  line-height: 1.6;
  display: none;
  animation: slideDown 0.4s ease;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.feedback-banner.show { display: block; }
.feedback-banner.success { background: rgba(74,124,89,0.15); border-left: 4px solid var(--success); color: var(--text-primary); }
.feedback-banner.error { background: rgba(200,71,43,0.15); border-left: 4px solid var(--error); color: var(--text-primary); }

/* CONFETTI */
.confetti-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9999;
}

/* BADGE */
.badge {
  display: inline-block;
  padding: 12px 24px;
  background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
  color: white;
  border-radius: 30px;
  font-family: 'Black Han Sans', sans-serif;
  font-size: 18px;
  margin: 12px 0;
  box-shadow: var(--shadow-lg);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* FLOWCHART INFOGRAPHIC */
.flowchart-svg {
  width: 100%;
  max-width: 900px;
  height: auto;
  margin: 20px auto;
  display: block;
  overflow: visible;
}
.flowchart-svg-wrapper {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.flowchart-svg-wrapper .flowchart-svg {
  min-width: 720px;
}

/* AI RECOMMENDATION */
.ai-rec-section {
  background: linear-gradient(135deg, rgba(74,124,89,0.08), rgba(212,160,76,0.05));
  border: 2px solid var(--accent-tertiary);
  border-radius: 16px;
  padding: 24px;
  margin: 20px 0;
}

.ai-rec-title {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 22px;
  color: var(--accent-tertiary);
  margin-bottom: 16px;
}

.ai-rec-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 14px;
}

.ai-rec-item {
  background: var(--bg-card);
  border-radius: 10px;
  padding: 14px;
  border: 1px solid var(--border-color);
}

.ai-rec-item h4 {
  font-size: 14px;
  color: var(--accent-primary);
  margin-bottom: 6px;
}

.ai-rec-item p {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
}

/* NAVIGATION */
.stage-nav {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-top: 24px;
  flex-wrap: wrap;
}

.observation-log {
  background: linear-gradient(135deg, rgba(74,124,89,0.05), transparent);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 14px;
  margin: 12px 0;
  font-size: 13px;
}

.observation-log h4 {
  font-size: 13px;
  color: var(--accent-tertiary);
  margin-bottom: 8px;
  font-weight: 700;
}

.log-entry {
  padding: 4px 0;
  color: var(--text-secondary);
}

.log-entry strong { color: var(--text-primary); }

/* HINT */
.hint-box {
  background: rgba(212,160,76,0.1);
  border: 1px dashed var(--accent-secondary);
  border-radius: 10px;
  padding: 14px;
  margin: 12px 0;
  font-size: 13px;
  display: none;
}

.hint-box.show { display: block; animation: fadeIn 0.3s; }

/* 자성/염산 단계 레이아웃 */
.mag-layout, .hcl-layout {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 24px;
}

/* 굳기 단계 - 드래그 실험 */
.hardness-exp {
  margin: 24px 0;
  padding: 20px;
  background: var(--bg-secondary);
  border-radius: 14px;
  border: 2px solid var(--border-color);
  transition: opacity 0.4s;
}
.hardness-exp-title {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 18px;
  margin-bottom: 8px;
  color: var(--text-primary);
}
.hardness-exp-hint {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 14px;
}
.hardness-bench {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 18px;
  align-items: center;
}
.hardness-target {
  position: relative;
  background: var(--bg-card);
  border: 2px solid var(--border-color);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  transition: border-color 0.2s, box-shadow 0.2s;
  min-height: 280px;
}
.hardness-target.hover-tool {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 4px rgba(200,71,43,0.15);
}
.hardness-target-label {
  font-weight: 700;
  color: var(--text-primary);
  font-size: 16px;
  margin-bottom: 12px;
}
.hardness-target-mineral {
  width: 200px;
  height: 200px;
  margin: 0 auto 10px;
  display: block;
  position: relative;
  z-index: 1;
}
.hardness-target-mineral svg {
  width: 100%;
  height: 100%;
  display: block;
}
.hardness-canvas {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  border-radius: 12px;
  z-index: 2;
}
.hardness-tool-zone {
  text-align: center;
  padding: 12px;
}
.hardness-tool-hint {
  font-size: 13px;
  color: var(--accent-primary);
  font-weight: 700;
  margin-bottom: 10px;
  animation: pulseLabel 1.6s ease-in-out infinite;
}
.hardness-tool {
  width: 160px;
  height: 160px;
  margin: 0 auto;
  cursor: grab;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.18));
  transition: transform 0.15s, filter 0.15s;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  position: relative;
}
.hardness-tool:hover {
  transform: scale(1.06) translateY(-2px);
  filter: drop-shadow(0 8px 16px rgba(200,71,43,0.35));
}
.hardness-tool.dragging {
  cursor: grabbing;
  filter: drop-shadow(0 12px 28px rgba(0,0,0,0.45));
  opacity: 0.92;
  pointer-events: none;
  transform: scale(1.15);
}
.hardness-tool.worn {
  /* 도구가 닳는 효과: 점점 흐려지면서 약간 작아짐 */
  transition: filter 0.5s, opacity 0.5s;
}
.hardness-tool svg { width: 100%; height: 100%; display: block; }
.hardness-tool-info {
  font-size: 14px;
  color: var(--text-secondary);
  font-weight: 600;
  margin-top: 10px;
}
.hardness-tool-warning {
  font-size: 12px;
  color: var(--error);
  font-weight: 700;
  margin-top: 6px;
  display: none;
}
.hardness-tool-warning.show { display: block; animation: shake 0.4s; }

/* 스포이트 squeeze 애니메이션 */
.hcl-dropper {
  cursor: pointer;
  transition: transform 0.15s;
  user-select: none;
  -webkit-user-select: none;
}
.hcl-dropper:hover {
  transform: translateX(-50%) translateY(-2px);
  filter: drop-shadow(0 6px 12px rgba(0,0,0,0.25));
}
.hcl-dropper:active, .hcl-dropper.squeezing {
  transform: translateX(-50%) scale(0.95);
}
.hcl-dropper svg ellipse:nth-of-type(2) {
  transform-origin: center;
  transition: transform 0.2s;
}
.hcl-dropper.squeezing svg > ellipse {
  transform: scaleY(0.7);
}
.dropper-pulse {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  pointer-events: none;
  animation: dropperPulse 2s ease-in-out infinite;
}
@keyframes dropperPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(140,200,235,0); }
  50% { box-shadow: 0 0 0 12px rgba(140,200,235,0); }
}

/* === 모바일 사용성 종합 개선 === */
@media (max-width: 768px) {
  .mag-layout, .hcl-layout {
    grid-template-columns: 1fr;
  }
  .hardness-bench {
    grid-template-columns: 1fr;
    gap: 16px;
  }
  .obs-container {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 600px) {
  .container { padding: 10px; }
  .stage-card { padding: 16px; border-radius: 14px; }
  .stage-title { font-size: 20px; gap: 8px; }
  .stage-number { font-size: 12px; padding: 3px 10px; }
  .stage-subtitle { font-size: 13px; }
  .brand-text h1 { font-size: 18px; }
  .brand-text p { font-size: 11px; }
  .brand-icon { width: 42px; height: 42px; font-size: 22px; }

  /* 헤더 컨트롤 압축 */
  header { padding: 12px 0; gap: 8px; }
  .header-controls { gap: 6px; flex-wrap: wrap; }
  .btn { padding: 8px 12px; font-size: 13px; min-height: 40px; }

  /* 진행 단계 pill */
  .progress-container { padding: 12px; }
  .step-pill { font-size: 10px; padding: 6px 4px; min-width: 50px; }
  .progress-header { font-size: 11px; }

  /* 광물 트레이 */
  .mineral-tray { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
  .mineral-card { padding: 10px; }
  .mineral-svg { height: 80px; }
  .mineral-name { font-size: 14px; }
  .mineral-formula { font-size: 10px; }

  /* 조흔판 - 모바일에서 세로 배치 */
  .streak-area { grid-template-columns: 1fr; gap: 10px; }
  .streak-plate { height: 130px; }

  /* 색상 옵션 */
  .color-options { grid-template-columns: 1fr; }
  .color-btn { padding: 10px; font-size: 12px; min-height: 44px; }

  /* 자성·염산 영역 */
  .magnetism-area { height: 250px; }
  .hcl-area { height: 280px; }

  /* 굳기 모스 스케일 */
  .mohs-scale { grid-template-columns: repeat(5, 1fr); gap: 3px; }
  .mohs-item { padding: 8px 2px; font-size: 9px; }
  .mohs-num { font-size: 14px; }

  /* 카드 매칭 */
  .compare-slots { grid-template-columns: 1fr; gap: 12px; }
  .attr-card { font-size: 11px; padding: 6px 10px; }
  .compare-table th, .compare-table td { padding: 8px 4px; font-size: 12px; }

  /* 결과 보고서 */
  .result-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .result-card { padding: 14px; }
  .result-value { font-size: 28px; }
  .result-label { font-size: 11px; }

  /* 정리 활동 */
  .ai-rec-grid { grid-template-columns: 1fr; }
  .pair-tab { font-size: 11px !important; padding: 6px 10px !important; }

  /* stage-nav 버튼들 */
  .stage-nav { flex-direction: column; gap: 8px; }
  .stage-nav > * { width: 100%; }
  .stage-nav > div { display: flex; gap: 8px; }
  .stage-nav > div > button { flex: 1; }

  /* 굳기 실험 */
  .hardness-target { min-height: 230px; padding: 14px; }
  .hardness-target-mineral { width: 150px; height: 150px; }
  .hardness-tool { width: 120px; height: 120px; }
  .hardness-area { padding: 14px; gap: 10px; }
  .hardness-vs { font-size: 24px; }

  /* 갤러리 */
  .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .photo-gallery-header { padding: 14px 16px; }
  .photo-gallery-header h2 { font-size: 16px; }
  .photo-gallery-body { padding: 14px; }
  .photo-item-name { font-size: 14px; }
  .photo-item-formula { font-size: 10px; }
  .photo-lightbox-nav { width: 36px; height: 36px; font-size: 16px; }
  .photo-lightbox-nav.prev { left: 6px; }
  .photo-lightbox-nav.next { right: 6px; }
  .photo-lightbox-caption { font-size: 16px; }

  /* 안전 체크리스트 */
  .safety-list { padding: 14px; }
  .safety-item { padding: 10px; font-size: 13px; gap: 10px; }
  .safety-checkbox { width: 22px; height: 22px; }

  /* 정보 박스 */
  .info-box { padding: 12px 14px; font-size: 13px; }

  /* 피드백 배너 */
  .feedback-banner { padding: 12px 14px; font-size: 13px; }

  /* 퀴즈 옵션 */
  .quiz-option { padding: 12px 14px; font-size: 12px; line-height: 1.4; }

  /* 모스 스케일 다시 (작은 화면에서 텍스트 가독성) */
  .mohs-item small { font-size: 8px; }

  /* 빈칸 채우기 input */
  .fill-blank-input { width: 80px; font-size: 13px; }
}

/* 작은 모바일 (~380px) */
@media (max-width: 400px) {
  .step-pill { font-size: 9px; min-width: 42px; }
  .btn { padding: 6px 10px; font-size: 12px; }
  .mineral-tray { grid-template-columns: repeat(2, 1fr); }
  .photo-grid { grid-template-columns: 1fr 1fr; }
}

/* PHOTO GALLERY MODAL */
.photo-gallery-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.78);
  z-index: 10000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeInOverlay 0.25s ease;
  backdrop-filter: blur(4px);
}

.photo-gallery-overlay.show { display: flex; }

@keyframes fadeInOverlay {
  from { opacity: 0; }
  to { opacity: 1; }
}

.photo-gallery-modal {
  background: var(--bg-card);
  border-radius: 20px;
  max-width: 1200px;
  width: 100%;
  max-height: 92vh;
  overflow-y: auto;
  position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.photo-gallery-header {
  position: sticky;
  top: 0;
  background: var(--bg-card);
  padding: 20px 28px;
  border-bottom: 2px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 10;
  border-radius: 20px 20px 0 0;
}

.photo-gallery-header h2 {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 24px;
  color: var(--text-primary);
  font-weight: 400;
  display: flex;
  align-items: center;
  gap: 10px;
}

.photo-gallery-close {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid var(--border-color);
  background: var(--bg-card);
  cursor: pointer;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.photo-gallery-close:hover {
  background: var(--accent-primary);
  color: white;
  border-color: var(--accent-primary);
  transform: rotate(90deg);
}

.photo-gallery-body {
  padding: 24px 28px;
}

.photo-gallery-intro {
  background: linear-gradient(135deg, rgba(212,160,76,0.1), rgba(200,71,43,0.05));
  border-left: 4px solid var(--accent-secondary);
  padding: 14px 18px;
  border-radius: 8px;
  margin-bottom: 20px;
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.photo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 16px;
}

.photo-item {
  background: var(--bg-secondary);
  border: 2px solid var(--border-color);
  border-radius: 14px;
  padding: 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}

.photo-item:hover {
  transform: translateY(-4px);
  border-color: var(--accent-primary);
  box-shadow: var(--shadow-lg);
}

.photo-item-img-wrap {
  width: 100%;
  aspect-ratio: 1/1;
  background: linear-gradient(180deg, #f8f5ee, #e8e0c8);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

[data-theme="dark"] .photo-item-img-wrap {
  background: linear-gradient(180deg, #2a2520, #1a1612);
}

.photo-item-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center;
  transition: transform 0.3s;
  padding: 4px;
}

.photo-item:hover .photo-item-img-wrap img {
  transform: scale(1.06);
}

.photo-item-name {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 18px;
  color: var(--text-primary);
  margin-bottom: 2px;
}

.photo-item-formula {
  font-size: 12px;
  color: var(--text-muted);
}

.photo-item-zoom-hint {

  right: 18px;

  color: white;
  padding: 4px 10px;
  border-radius: 14px;
  font-size: 11px;
  opacity: 0;
  transition: opacity 0.2s;
}

.photo-item:hover .photo-item-zoom-hint { opacity: 1; }

/* PHOTO LIGHTBOX (zoom) */
.photo-lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 10001;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  cursor: zoom-out;
}

.photo-lightbox.show { display: flex; animation: fadeInOverlay 0.2s ease; }

.photo-lightbox-content {

}

.photo-lightbox-content img {

  box-shadow: 0 12px 40px rgba(0,0,0,0.6);
}

.photo-lightbox-caption {
  color: white;
  font-family: 'Black Han Sans', sans-serif;
  font-size: 22px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
}

.photo-lightbox-caption span {
  font-family: 'Gowun Dodum', sans-serif;
  font-size: 14px;
  opacity: 0.85;
  margin-left: 10px;
}

.photo-lightbox-nav {
  position: absolute;
  top: 50%;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.4);
  background: rgba(0,0,0,0.4);

  display: flex;
  align-items: center;
  justify-content: center;

}

.photo-lightbox-nav:hover {
  background: var(--accent-primary);
  border-color: var(--accent-primary);
}

.photo-lightbox-nav.prev { left: 24px; }
.photo-lightbox-nav.next { right: 24px; }

@media (max-width: 600px) {
  .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .photo-gallery-header h2 { font-size: 18px; }
  .photo-gallery-body { padding: 16px; }
  .photo-lightbox-nav { width: 40px; height: 40px; font-size: 18px; }
  .photo-lightbox-nav.prev { left: 8px; }
  .photo-lightbox-nav.next { right: 8px; }
}

// ============== 광물 사진 갤러리 ==============
let lightboxIndex = 0;
const PHOTO_ORDER = ['quartz','calcite','pyrite','chalcopyrite','magnetite','hematite','biotite'];

function buildPhotoGallery() {
  const grid = document.getElementById('photoGrid');
  if (!grid) return;
  grid.innerHTML = '';
  PHOTO_ORDER.forEach((id, idx) => {
    const m = MINERALS[id];
    const item = document.createElement('div');
    item.className = 'photo-item';
    item.setAttribute('role', 'button');
    item.setAttribute('tabindex', '0');
    item.setAttribute('aria-label', `${m.name} 사진 크게 보기`);
    item.innerHTML = `
      <div class="photo-item-img-wrap">
        <img src="${MINERAL_PHOTOS[id]}" alt="${m.name} 실제 사진" loading="lazy">
      </div>
      <div class="photo-item-name">${m.name}</div>
      <div class="photo-item-formula">${m.formula}</div>
      <div class="photo-item-zoom-hint">🔍 클릭</div>
    `;
    item.addEventListener('click', () => openLightbox(idx));
    item.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openLightbox(idx);
      }
    });
    grid.appendChild(item);
  });
}

function openPhotoGallery() {
  const overlay = document.getElementById('photoGalleryOverlay');
  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';
  playSound('ding');
}

function closePhotoGallery() {
  const overlay = document.getElementById('photoGalleryOverlay');
  overlay.classList.remove('show');
  document.body.style.overflow = '';
}

function openLightbox(index) {
  lightboxIndex = index;
  updateLightbox();
  document.getElementById('photoLightbox').classList.add('show');
  playSound('click');
}

function closeLightbox() {
  document.getElementById('photoLightbox').classList.remove('show');
}

function updateLightbox() {
  const id = PHOTO_ORDER[lightboxIndex];
  const m = MINERALS[id];
  const img = document.getElementById('lightboxImg');
  img.src = MINERAL_PHOTOS[id];
  img.alt = `${m.name} 실제 사진`;
  document.getElementById('lightboxCaption').innerHTML = `${m.name} <span>${m.formula}</span>`;
}

function navLightbox(delta) {
  lightboxIndex = (lightboxIndex + delta + PHOTO_ORDER.length) % PHOTO_ORDER.length;
  updateLightbox();
  playSound('slide');
}

// 갤러리 이벤트 바인딩
document.addEventListener('DOMContentLoaded', () => {
  const galleryBtn = document.getElementById('photoGalleryBtn');
  const overlay = document.getElementById('photoGalleryOverlay');
  const closeBtn = document.getElementById('photoGalleryClose');
  const lightbox = document.getElementById('photoLightbox');
  const prevBtn = document.getElementById('lightboxPrev');
  const nextBtn = document.getElementById('lightboxNext');

  if (galleryBtn) galleryBtn.addEventListener('click', () => {
    buildPhotoGallery();
    openPhotoGallery();
  });
  if (closeBtn) closeBtn.addEventListener('click', closePhotoGallery);
  if (overlay) overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closePhotoGallery();
  });

  if (lightbox) lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox || e.target.tagName === 'IMG' || e.target.classList.contains('photo-lightbox-content')) {
      closeLightbox();
    }
  });
  if (prevBtn) prevBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    navLightbox(-1);
  });
  if (nextBtn) nextBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    navLightbox(1);
  });

  // 키보드 단축키
  document.addEventListener('keydown', (e) => {
    if (lightbox && lightbox.classList.contains('show')) {
      if (e.key === 'ArrowLeft') navLightbox(-1);
      else if (e.key === 'ArrowRight') navLightbox(1);
      else if (e.key === 'Escape') closeLightbox();
    } else if (overlay && overlay.classList.contains('show')) {
      if (e.key === 'Escape') closePhotoGallery();
    }
  });
});

// ============== 사운드 (Web Audio API) ==============
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playSound(type) {
  try {
    const ctx = initAudio();
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;

    if (type === 'ding') {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      osc.start(now); osc.stop(now + 0.3);
    } else if (type === 'click') {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 600;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'success') {
      [523, 659, 784, 1047].forEach((f, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = f;
        gain.gain.setValueAtTime(0, now + i*0.08);
        gain.gain.linearRampToValueAtTime(0.15, now + i*0.08 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i*0.08 + 0.4);
        osc.start(now + i*0.08); osc.stop(now + i*0.08 + 0.4);
      });
    } else if (type === 'error') {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(220, now);
      osc.frequency.linearRampToValueAtTime(110, now + 0.3);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      osc.start(now); osc.stop(now + 0.3);
    } else if (type === 'scratch') {
      const noise = ctx.createBufferSource();
      const buffer = ctx.createBuffer(1, ctx.sampleRate * 0.15, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
      noise.buffer = buffer;
      const filter = ctx.createBiquadFilter();
      filter.type = 'highpass';
      filter.frequency.value = 1500;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      noise.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
      noise.start(now); noise.stop(now + 0.15);
    } else if (type === 'magnet') {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(120, now);
      osc.frequency.exponentialRampToValueAtTime(440, now + 0.15);
      osc.type = 'square';
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      osc.start(now); osc.stop(now + 0.2);
    } else if (type === 'bubble') {
      const noise = ctx.createBufferSource();
      const buffer = ctx.createBuffer(1, ctx.sampleRate * 0.8, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) {

      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      osc.start(now); osc.stop(now + 0.25);
    } else if (type === 'step') {
      [523, 659, 784].forEach((f, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = f;
        gain.gain.setValueAtTime(0, now + i*0.06);
        gain.gain.linearRampToValueAtTime(0.12, now + i*0.06 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i*0.06 + 0.2);
        osc.start(now + i*0.06); osc.stop(now + i*0.06 + 0.2);
      });
    }
  } catch(e) { console.warn('Audio error:', e); }
}

// ============== 상태 관리 ==============
const STATE = {
  currentStage: 0,
  safetyChecked: [false, false, false, false],
  selectedMineral: null,
  observed: {},  // {mineralId: {bodyColor: bool, streak: bool}}
  magnetismDone: {},
  hclDone: {},
  hardnessQuizAnswered: false,
  skipped: {},  // {stageNum: true} - 건너뛴 단계 (이수율 만점에서 제외)
  visited: {},  // {stageNum: true} - 방문한 단계
  summaryAnswers: {
    a1: null, a1Hint: false,
    a2: [],
    a3: { pair1Done: false, pair2Done: false, pair3Done: false, currentPair: 0 },
    a4: { blanks: ['', '', '', '', '', ''], correctCount: 0 }
  },
  scores: {
    bodyColor: 0,
    streak: 0,
    quiz: 0,
    matching: 0,
    summary: 0
  }
};

const STAGE_NAMES = ['안전수칙', '광물선택', '겉보기색', '조흔색', '자성', '염산반응', '굳기비교', '정리하기', '결과보고'];
// 단계별 만점 (skipped 단계는 만점에서 제외하여 이수율 계산)
const STAGE_MAX_SCORES = {
  0: 1, // 안전수칙 통과
  1: 1, // 광물 선택
  2: 7, // 겉보기색 7종
  3: 7, // 조흔색 7종
  4: 7, // 자성 7종
  5: 7, // 염산 7종
  6: 1, // 굳기 퀴즈
  7: 4, // 정리 활동 4개
  8: 0  // 결과 보고서 (점수 없음)
};
// 단계별 실제 획득 점수 계산
function getStageScore(stage) {
  if (STATE.skipped[stage]) return 0;
  switch(stage) {
    case 0: return STATE.safetyChecked.every(c=>c) ? 1 : 0;
    case 1: return STATE.selectedMineral ? 1 : 0;
    case 2: return MINERAL_ORDER.filter(id => STATE.observed[id]?.bodyColor).length;
    case 3: return MINERAL_ORDER.filter(id => STATE.observed[id]?.streak).length;
    case 4: return MINERAL_ORDER.filter(id => STATE.magnetismDone[id]).length;
    case 5: return MINERAL_ORDER.filter(id => STATE.hclDone[id]).length;
    case 6: return STATE.hardnessQuizAnswered ? 1 : 0;
    case 7: {
      let s = 0;
      if (STATE.summaryAnswers.a1Text || STATE.summaryAnswers.a1 === 1) s++;
      if (STATE.summaryAnswers.a2.length > 0) s++;
      if (STATE.summaryAnswers.a3.pair1Done && STATE.summaryAnswers.a3.pair2Done && STATE.summaryAnswers.a3.pair3Done) s++;
      if (STATE.summaryAnswers.a4.correctCount === 6) s++;
      return s;
    }
    default: return 0;
  }
}
// 진도 이수율 계산 (skipped 제외)
function calculateProgress() {
  let earned = 0, possible = 0;
  for (let i = 0; i < 8; i++) {
    if (STATE.skipped[i]) continue; // 건너뛴 단계는 만점에서도 제외
    earned += getStageScore(i);
    possible += STAGE_MAX_SCORES[i];
  }
  return { earned, possible, percent: possible > 0 ? Math.round(earned/possible*100) : 0 };
}

// 초기화: 모든 광물 관찰 상태 초기화
MINERAL_ORDER.forEach(id => {
  STATE.observed[id] = { bodyColor: false, streak: false };
  STATE.magnetismDone[id] = false;
  STATE.hclDone[id] = false;
});

// ============== 전역 함수 ==============
function updateProgress() {
  const stepsContainer = document.getElementById('progressSteps');
  stepsContainer.innerHTML = '';
  STAGE_NAMES.forEach((name, i) => {
    const pill = document.createElement('div');
    pill.className = 'step-pill';
    if (i === STATE.currentStage) pill.classList.add('active');
    else if (STATE.skipped[i]) pill.classList.add('skipped');
    else if (STATE.visited[i] && i < STATE.currentStage) pill.classList.add('done');
    pill.textContent = `${i+1}. ${name}`;
    pill.title = `${name} 단계로 이동`;
    pill.style.cursor = 'pointer';
    pill.addEventListener('click', () => goToStage(i));
    stepsContainer.appendChild(pill);
  });
  // 진도 이수율(skipped 제외) 표시
  const prog = calculateProgress();
  document.getElementById('progressPercent').textContent = `이수율 ${prog.percent}% (${prog.earned}/${prog.possible})`;
  document.getElementById('progressLabel').textContent = `${STATE.currentStage + 1}. ${STAGE_NAMES[STATE.currentStage]} 단계`;
}

function goToStage(n) {
  if (n < 0 || n >= STAGE_NAMES.length) return;
  STATE.currentStage = n;
  STATE.visited[n] = true;
  document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
  document.getElementById(`stage-${n}`).classList.add('active');
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  playSound('step');
}

// 단계 건너뛰기
function skipStage(n) {
  if (!confirm(`${n+1}. ${STAGE_NAMES[n]} 단계를 건너뛰시겠습니까?\n(건너뛴 단계는 이수율 계산에서 만점·획득 점수 모두 제외됩니다.)`)) return;
  STATE.skipped[n] = true;
  goToStage(n + 1);
}

// 메인 초기화
window.addEventListener('DOMContentLoaded', () => {
  buildAllStages();
  updateProgress();
  goToStage(0);

  document.getElementById('themeToggle').addEventListener('click', toggleTheme);
  document.getElementById('restartBtn').addEventListener('click', () => {
    if (confirm('처음부터 다시 시작하시겠습니까? 진행 상황이 모두 초기화됩니다.')) {
      location.reload();
    }
  });
});

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const newTheme = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', newTheme);
  document.getElementById('themeToggle').textContent = newTheme === 'dark' ? '☀️ 라이트' : '🌙 다크';
}
